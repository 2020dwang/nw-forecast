<body>
  <div id="root"><div style="color:#4b5563;font-family:monospace;padding:40px;text-align:center">Loading nw.forecast...</div></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine } = Recharts;


// ── Tax helpers ───────────────────────────────────────────────────────────────
const FED_BRACKETS_SINGLE_2025 = [
  { min: 0,       max: 11925,    rate: 0.10 },
  { min: 11925,   max: 48475,    rate: 0.12 },
  { min: 48475,   max: 103350,   rate: 0.22 },
  { min: 103350,  max: 197300,   rate: 0.24 },
  { min: 197300,  max: 250525,   rate: 0.32 },
  { min: 250525,  max: 626350,   rate: 0.35 },
  { min: 626350,  max: Infinity, rate: 0.37 },
];
const STANDARD_DEDUCTION_SINGLE = 15000;
const STANDARD_DEDUCTION_MFJ    = 30000;

const FED_BRACKETS_MFJ_2025 = [
  { min: 0,        max: 23850,    rate: 0.10 },
  { min: 23850,    max: 96950,    rate: 0.12 },
  { min: 96950,    max: 206700,   rate: 0.22 },
  { min: 206700,   max: 394600,   rate: 0.24 },
  { min: 394600,   max: 501050,   rate: 0.32 },
  { min: 501050,   max: 751600,   rate: 0.35 },
  { min: 751600,   max: Infinity, rate: 0.37 },
];

const STATE_TAX_BY_ZIP = (zip) => {
  const p = parseInt(zip?.slice(0, 3) || "0", 10);
  if (p >= 10  && p <= 149) return 0.0685;
  if (p >= 900 && p <= 961) return 0.0813;
  if (p >= 600 && p <= 629) return 0.0495;
  if (p >= 770 && p <= 779) return 0.0000;
  if (p >= 320 && p <= 349) return 0.0000;
  if (p >= 980 && p <= 994) return 0.0000;
  if (p >= 970 && p <= 979) return 0.0875;
  if (p >= 300 && p <= 319) return 0.0575;
  if (p >= 150 && p <= 196) return 0.0307;
  if (p >= 200 && p <= 212) return 0.0575;
  if (p >= 430 && p <= 459) return 0.0399;
  if (p >= 480 && p <= 499) return 0.0425;
  if (p >= 550 && p <= 567) return 0.0985;
  if (p >= 700 && p <= 729) return 0.0600;
  if (p >= 850 && p <= 865) return 0.0259;
  if (p >= 800 && p <= 816) return 0.0450;
  if (p >= 890 && p <= 898) return 0.0000;
  return 0.05;
};

// Effective property tax rate by ZIP (annual % of property value)
// Source: Tax Foundation / Census Bureau state averages, adjusted for metro vs rural
const PROPERTY_TAX_BY_ZIP = (zip) => {
  const p = parseInt(zip?.slice(0, 3) || "0", 10);
  // Very high: NJ, IL, CT, NH, WI, TX (no income tax, high property tax)
  if (p >= 70  && p <= 89)  return 0.0220; // New Jersey
  if (p >= 600 && p <= 629) return 0.0205; // Illinois
  if (p >= 60  && p <= 69)  return 0.0190; // Connecticut
  if (p >= 30  && p <= 38)  return 0.0180; // New Hampshire
  if (p >= 530 && p <= 549) return 0.0175; // Wisconsin
  if (p >= 750 && p <= 799) return 0.0165; // Texas
  if (p >= 770 && p <= 779) return 0.0165; // Houston
  // High: NY, PA, OH, MI, IA, NE, VT, RI
  if (p >= 10  && p <= 149) return 0.0158; // New York metro
  if (p >= 100 && p <= 102) return 0.0120; // Manhattan (assessed lower)
  if (p >= 150 && p <= 196) return 0.0150; // Pennsylvania
  if (p >= 430 && p <= 459) return 0.0148; // Ohio
  if (p >= 480 && p <= 499) return 0.0142; // Michigan
  if (p >= 500 && p <= 528) return 0.0145; // Iowa
  if (p >= 680 && p <= 693) return 0.0148; // Nebraska
  if (p >= 50  && p <= 59)  return 0.0168; // Vermont
  if (p >= 28  && p <= 29)  return 0.0145; // Rhode Island
  // Moderate: CA, WA, OR, CO, MN, MO, MD, VA, NC, GA
  if (p >= 900 && p <= 961) return 0.0073; // California (Prop 13 limited)
  if (p >= 980 && p <= 994) return 0.0092; // Washington
  if (p >= 970 && p <= 979) return 0.0090; // Oregon
  if (p >= 800 && p <= 816) return 0.0049; // Colorado
  if (p >= 550 && p <= 567) return 0.0108; // Minnesota
  if (p >= 630 && p <= 658) return 0.0096; // Missouri
  if (p >= 200 && p <= 212) return 0.0098; // Maryland / DC
  if (p >= 220 && p <= 246) return 0.0082; // Virginia
  if (p >= 270 && p <= 289) return 0.0083; // North Carolina
  if (p >= 300 && p <= 319) return 0.0091; // Georgia
  if (p >= 850 && p <= 865) return 0.0062; // Arizona
  if (p >= 890 && p <= 898) return 0.0053; // Nevada
  if (p >= 787 && p <= 788) return 0.0165; // Austin TX (higher effective)
  // Low: HI, AL, SC, DC, LA, WV, DE
  if (p >= 967 && p <= 969) return 0.0028; // Hawaii
  if (p >= 350 && p <= 369) return 0.0039; // Alabama
  if (p >= 290 && p <= 299) return 0.0054; // South Carolina
  if (p >= 700 && p <= 729) return 0.0055; // Louisiana
  if (p >= 240 && p <= 268) return 0.0058; // West Virginia / Virginia rural
  if (p >= 197 && p <= 199) return 0.0054; // Delaware
  if (p >= 386 && p <= 397) return 0.0052; // Mississippi
  if (p >= 370 && p <= 385) return 0.0067; // Tennessee
  if (p >= 716 && p <= 729) return 0.0062; // Arkansas
  return 0.0100; // national average baseline
};

function calcFederalTax(income) {
  const taxable = Math.max(0, income - STANDARD_DEDUCTION_SINGLE);
  let tax = 0;
  for (const b of FED_BRACKETS_SINGLE_2025) {
    if (taxable <= b.min) break;
    tax += (Math.min(taxable, b.max) - b.min) * b.rate;
  }
  return tax;
}

function calcTotalTax(income, zip) {
  const federal = calcFederalTax(income);
  const fica = Math.min(income, 176100) * 0.062 + income * 0.0145;
  const state = Math.max(0, income - STANDARD_DEDUCTION_SINGLE) * STATE_TAX_BY_ZIP(zip);
  return federal + fica + state;
}

// ── Cost-of-living multiplier by ZIP ─────────────────────────────────────────
// Base costs calibrated to national mid-cost average (multiplier = 1.0).
// Derived from MIT Living Wage calculator, USDA child expenditure data, regional COL indices.
const COL_MULTIPLIER_BY_ZIP = (zip) => {
  const p = parseInt(zip?.slice(0, 3) || "0", 10);
  // Very high cost
  if (p >= 100 && p <= 102) return 2.10; // Manhattan
  if (p >= 10  && p <= 119) return 1.85; // NYC metro
  if (p >= 940 && p <= 941) return 2.00; // San Francisco
  if (p >= 943 && p <= 944) return 1.90; // Silicon Valley
  if (p >= 900 && p <= 902) return 1.75; // LA core
  if (p >= 903 && p <= 912) return 1.55; // LA metro / OC
  if (p >= 980 && p <= 981) return 1.80; // Seattle
  if (p >= 200 && p <= 202) return 1.85; // DC
  if (p >= 20  && p <= 24)  return 1.70; // Boston
  if (p >= 941 && p <= 942) return 1.65; // East Bay
  // High cost
  if (p >= 606 && p <= 607) return 1.45; // Chicago core
  if (p >= 600 && p <= 629) return 1.30; // Chicago metro
  if (p >= 331 && p <= 334) return 1.40; // Miami
  if (p >= 800 && p <= 802) return 1.40; // Denver
  if (p >= 787 && p <= 788) return 1.35; // Austin
  if (p >= 970 && p <= 972) return 1.40; // Portland OR
  if (p >= 919 && p <= 922) return 1.50; // San Diego
  if (p >= 150 && p <= 152) return 1.20; // Philadelphia
  if (p >= 770 && p <= 772) return 1.25; // Houston
  if (p >= 750 && p <= 752) return 1.20; // Dallas
  if (p >= 303 && p <= 304) return 1.25; // Atlanta
  if (p >= 850 && p <= 853) return 1.20; // Phoenix
  if (p >= 890 && p <= 891) return 1.30; // Las Vegas
  // Low cost: rural South, Midwest, Appalachia
  if (p >= 350 && p <= 369) return 0.82; // Alabama
  if (p >= 386 && p <= 397) return 0.80; // Mississippi
  if (p >= 716 && p <= 729) return 0.83; // Arkansas / rural Louisiana
  if (p >= 570 && p <= 577) return 0.85; // South Dakota
  if (p >= 580 && p <= 588) return 0.85; // North Dakota
  if (p >= 240 && p <= 246) return 0.83; // West Virginia
  if (p >= 400 && p <= 427) return 0.88; // Kentucky
  if (p >= 370 && p <= 385) return 0.87; // Tennessee (non-Nashville)
  if (p >= 460 && p <= 479) return 0.88; // Indiana
  if (p >= 500 && p <= 528) return 0.90; // Iowa
  return 1.0; // national average baseline
};


// Median 1BR rent baseline by ZIP (today's dollars, national median ~$1,500)
const MEDIAN_RENT_BY_ZIP = (zip) => {
  return Math.round(1500 * COL_MULTIPLIER_BY_ZIP(zip));
};

// Base costs are national mid-cost baselines; scaled by COL factor for locality
function childCostPerMonth(childAgeYears, colMultiplier = 1.0) {
  if (childAgeYears < 0)  return 0;
  if (childAgeYears < 1)  return Math.round(2200 * colMultiplier);
  if (childAgeYears < 5)  return Math.round(1800 * colMultiplier);
  if (childAgeYears < 13) return Math.round(1100 * colMultiplier);
  if (childAgeYears < 18) return Math.round(1300 * colMultiplier);
  return 0;
}

// Custom phase lookup: phases = [{years, amount}, ...] in today's dollars
// Returns 0 once all phases are exhausted
function childCostCustom(childAgeYears, phases) {
  if (childAgeYears < 0) return 0;
  let cursor = 0;
  for (const phase of phases) {
    if (childAgeYears < cursor + phase.years) return phase.amount;
    cursor += phase.years;
  }
  return 0;
}

function calcFederalTaxMFJ(combinedIncome) {
  const taxable = Math.max(0, combinedIncome - STANDARD_DEDUCTION_MFJ);
  let tax = 0;
  for (const b of FED_BRACKETS_MFJ_2025) {
    if (taxable <= b.min) break;
    tax += (Math.min(taxable, b.max) - b.min) * b.rate;
  }
  return tax;
}

function calcTotalTaxMFJ(income1, income2, zip) {
  const combined = income1 + income2;
  const federal = calcFederalTaxMFJ(combined);
  // FICA computed individually (SS cap applies per person)
  const fica1 = Math.min(income1, 176100) * 0.062 + income1 * 0.0145;
  const fica2 = Math.min(income2, 176100) * 0.062 + income2 * 0.0145;
  const state = Math.max(0, combined - STANDARD_DEDUCTION_MFJ) * STATE_TAX_BY_ZIP(zip);
  return federal + fica1 + fica2 + state;
}

// ── Inflation presets ─────────────────────────────────────────────────────────
const INFLATION_PRESETS = {
  conservative: { label: "Conservative", pct: 2.0, color: "#34d399", desc: "Fed target / low-inflation era" },
  historical:   { label: "Historical Avg", pct: 3.1, color: "#fbbf24", desc: "US CPI avg since 1926" },
  optimistic:   { label: "Elevated",       pct: 5.0, color: "#f87171", desc: "1970s-style / persistent inflation" },
};

// ── Projection engine ─────────────────────────────────────────────────────────
function runProjection(params) {
  const {
    currentNetWorth, currentSalary,
    salaryGrowthMode, salaryGrowthPct, salarySteps,
    monthlyRent, rentGrowthMode, rentGrowthPct, rentSteps,
    monthlyOtherExpenses, otherGrowthMode, otherGrowthPct, otherSteps,
    zip, zipMoves,
    investmentReturnPct, inflationPct,
    kids, projectionYears,
    partner,
    home,
  } = params;

  const nominalMonthlyReturn = Math.pow(1 + investmentReturnPct / 100, 1 / 12) - 1;
  let netWorthNominal = currentNetWorth;
  let partnerNWAdded = false;
  let partnerJoined = false;

  // Home purchase state
  let homeActive = false;
  let propertyValue = 0;
  let mortgageBalance = 0;
  let monthlyMortgagePayment = 0;
  if (home?.enabled) {
    const purchasePrice = home.purchasePrice || 0;
    const downFrac = (home.downPct || 20) / 100;
    const principal = purchasePrice * (1 - downFrac);
    const monthlyRate = (home.interestRate || 6) / 100 / 12;
    const n = (home.termYears || 30) * 12;
    monthlyMortgagePayment = monthlyRate === 0 ? principal / n
      : principal * monthlyRate * Math.pow(1 + monthlyRate, n) / (Math.pow(1 + monthlyRate, n) - 1);
  }
  let salary = currentSalary;
  // Partner values stored in today's dollars; inflated to nominal on join year
  let partnerSalary = 0;
  let partnerRent   = 0;
  let partnerOther  = 0;
  let rent = monthlyRent;
  let other = monthlyOtherExpenses;
  const data = [];

  // Sort moves chronologically
  const sortedMoves = [...(zipMoves || [])].sort((a, b) => a.year - b.year);
  let activeZip = zip;
  let prevColMultiplier = COL_MULTIPLIER_BY_ZIP(zip);

  for (let year = 0; year <= projectionYears; year++) {
    const inflationFactor = Math.pow(1 + inflationPct / 100, year);
    // Activate partner finances at marriageYear — inflate their values to nominal at that year
    const partnerActive = partner?.enabled && year >= (partner.marriageYear ?? 1);
    if (partner?.enabled && !partnerJoined && year >= (partner.marriageYear ?? 1)) {
      partnerSalary = (partner.salary || 0) * inflationFactor;
      partnerRent   = (partner.rent   || 0) * inflationFactor;
      partnerOther  = (partner.otherExp || 0) * inflationFactor;
      partnerJoined = true;
    }
    if (partner?.enabled && !partnerNWAdded && year >= (partner.marriageYear ?? 1)) {
      netWorthNominal += (partner.netWorth || 0);
      partnerNWAdded = true;
    }
    const deflator = 1 / inflationFactor;

    // Apply ZIP move: update tax jurisdiction, re-index rent to new market
    const moveThisYear = sortedMoves.find(m => m.year === year);
    if (moveThisYear && moveThisYear.zip.length >= 5) {
      const newColMultiplier = COL_MULTIPLIER_BY_ZIP(moveThisYear.zip);
      if (prevColMultiplier > 0 && !homeActive) rent = rent * (newColMultiplier / prevColMultiplier);
      prevColMultiplier = newColMultiplier;
      activeZip = moveThisYear.zip;
    }

    // Home purchase: deduct down payment from liquid NW, track mortgage + property
    if (home?.enabled && !homeActive && year === (home.purchaseYear ?? 0)) {
      const purchasePrice = home.purchasePrice || 0;
      const downAmt = purchasePrice * (home.downPct || 20) / 100;
      netWorthNominal -= downAmt; // down payment leaves liquid NW
      propertyValue = purchasePrice; // purchase at today's entered price
      mortgageBalance = purchasePrice * (1 - (home.downPct || 20) / 100);
      rent = 0; // rent replaced by mortgage payment
      homeActive = true;
    }
    // Appreciate property and amortize mortgage each year (not in purchase year)
    if (homeActive && year > (home.purchaseYear ?? 0)) {
      propertyValue *= (1 + (home.appreciationPct || inflationPct) / 100);
      // Amortize 12 months of mortgage payments
      const monthlyRate = (home.interestRate || 6) / 100 / 12;
      for (let m = 0; m < 12; m++) {
        const interestPmt = mortgageBalance * monthlyRate;
        const principalPmt = Math.max(0, monthlyMortgagePayment - interestPmt);
        mortgageBalance = Math.max(0, mortgageBalance - principalPmt);
      }
    }

    if (year > 0) {
      // Salary (COLA + real raise)
      if (salaryGrowthMode === "percentage") {
        salary = salary * (1 + salaryGrowthPct / 100 + inflationPct / 100);
      } else {
        const step = salarySteps.find(s => s.year === year);
        if (step) salary = step.salary * Math.pow(1 + inflationPct / 100, year);
        else salary = salary * (1 + inflationPct / 100);
      }
      // Partner salary: mode-aware, same logic as primary
      if (partnerActive) {
        if ((partner.salaryMode || "percentage") === "percentage") {
          partnerSalary = partnerSalary * (1 + (partner.salaryGrowthPct || 0) / 100 + inflationPct / 100);
        } else {
          const step = (partner.salarySteps || []).find(s => s.year === year);
          if (step) partnerSalary = step.salary * Math.pow(1 + inflationPct / 100, year);
          else partnerSalary = partnerSalary * (1 + inflationPct / 100);
        }
        if ((partner.rentMode || "percentage") === "percentage") {
          partnerRent = partnerRent * (1 + (partner.rentGrowthPct || 0) / 100 + inflationPct / 100);
        } else {
          const step = (partner.rentSteps || []).find(s => s.year === year);
          if (step) partnerRent = step.amount * Math.pow(1 + inflationPct / 100, year);
          else partnerRent = partnerRent * (1 + inflationPct / 100);
        }
        if ((partner.otherMode || "percentage") === "percentage") {
          partnerOther = partnerOther * (1 + (partner.otherGrowthPct || 0) / 100 + inflationPct / 100);
        } else {
          const step = (partner.otherSteps || []).find(s => s.year === year);
          if (step) partnerOther = step.amount * Math.pow(1 + inflationPct / 100, year);
          else partnerOther = partnerOther * (1 + inflationPct / 100);
        }
      }
      // Rent: always inflates at CPI (suppressed once home is purchased)
      if (!homeActive) {
        if (rentGrowthMode === "percentage") {
          rent = rent * (1 + rentGrowthPct / 100 + inflationPct / 100);
        } else {
          const step = rentSteps.find(s => s.year === year);
          if (step) rent = step.amount * Math.pow(1 + inflationPct / 100, year);
          else rent = rent * (1 + inflationPct / 100);
        }
      }
      // Other expenses: same logic
      if (otherGrowthMode === "percentage") {
        other = other * (1 + otherGrowthPct / 100 + inflationPct / 100);
      } else {
        const step = otherSteps.find(s => s.year === year);
        if (step) other = step.amount * Math.pow(1 + inflationPct / 100, year);
        else other = other * (1 + inflationPct / 100);
      }
    }

    let annualTax, monthlyAfterTax;
    if (partnerActive) {
      annualTax = calcTotalTaxMFJ(salary, partnerSalary, activeZip);
      monthlyAfterTax = (salary + partnerSalary - annualTax) / 12;
    } else {
      annualTax = calcTotalTax(salary, activeZip);
      monthlyAfterTax = (salary - annualTax) / 12;
    }

    // Child costs inflate with CPI
    const childExpenses = kids.reduce((sum, k) => {
      const childAge = year - k.birthYear;
      const monthlyCost = k.costMode === "custom" && k.phases?.length > 0
        ? childCostCustom(childAge, k.phases) * inflationFactor
        : childCostPerMonth(childAge, COL_MULTIPLIER_BY_ZIP(activeZip)) * inflationFactor;
      return sum + monthlyCost * 12;
    }, 0) / 12;

    const partnerExpenses = partnerActive ? (partnerRent + partnerOther) : 0;
    const propTaxRate = home?.taxRate != null ? home.taxRate / 100 : PROPERTY_TAX_BY_ZIP(activeZip);
    const monthlyPropertyTax = homeActive ? (propertyValue * propTaxRate / 12) : 0;
    const monthlyHOA = homeActive ? (home?.hoaFee || 0) * Math.pow(1 + inflationPct / 100, year) : 0;
    const activeMortgagePayment = homeActive && mortgageBalance > 0 ? monthlyMortgagePayment : 0;
    const housingCost = homeActive ? activeMortgagePayment + monthlyPropertyTax + monthlyHOA : rent;
    const monthlyExpenses = housingCost + other + childExpenses + partnerExpenses;
    const monthlySavings = monthlyAfterTax - monthlyExpenses;

    if (year > 0) {
      for (let m = 0; m < 12; m++) {
        netWorthNominal = netWorthNominal * (1 + nominalMonthlyReturn) + monthlySavings;
      }
    }

    const homeEquity = homeActive ? Math.max(0, propertyValue - mortgageBalance) : 0;
    const liquidNW = netWorthNominal; // liquid NW tracked separately (home equity added on top)
    const totalNWNominal = netWorthNominal + homeEquity;
    const netWorthReal = totalNWNominal * deflator;
    const liquidNWReal = liquidNW * deflator;

    data.push({
      year,
      netWorthNominal: Math.round(totalNWNominal),
      netWorthReal: Math.round(netWorthReal),
      liquidNW: Math.round(liquidNW),
      liquidNWReal: Math.round(liquidNWReal),
      homeEquity: Math.round(homeEquity),
      propertyValue: Math.round(propertyValue),
      mortgageBalance: Math.round(mortgageBalance),
      monthlyPropertyTax: Math.round(homeActive ? propertyValue * (home?.taxRate != null ? home.taxRate / 100 : PROPERTY_TAX_BY_ZIP(activeZip)) / 12 : 0),
      salary: Math.round(salary),
      salaryReal: Math.round(salary * deflator),
      partnerSalary: Math.round(partnerSalary),
      combinedSalary: Math.round(salary + partnerSalary),
      combinedSalaryReal: Math.round((salary + partnerSalary) * deflator),
      monthlyAfterTax: Math.round(monthlyAfterTax),
      monthlyAfterTaxReal: Math.round(monthlyAfterTax * deflator),
      monthlyExpenses: Math.round(monthlyExpenses),
      monthlyExpensesReal: Math.round(monthlyExpenses * deflator),
      monthlySavings: Math.round(monthlySavings),
      monthlySavingsReal: Math.round(monthlySavings * deflator),
      childExpenses: Math.round(childExpenses),
      annualTax: Math.round(annualTax),
      inflationFactor: inflationFactor.toFixed(2),
      activeZip,
    });
  }

  return data;
}

// ── Formatting ────────────────────────────────────────────────────────────────
const fmt = (n) => {
  if (Math.abs(n) >= 1e6) return `$${(n / 1e6).toFixed(2)}M`;
  if (Math.abs(n) >= 1e3) return `$${(n / 1e3).toFixed(0)}K`;
  return `$${Math.round(n)}`;
};
const fmtFull = (n) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#0a0d14", border: "1px solid #2a2d3a", borderRadius: 10, padding: "12px 16px", fontSize: 12 }}>
      <p style={{ color: "#6b7280", marginBottom: 8, fontWeight: 600 }}>Year {label}</p>
      {payload.map(p => (
        <p key={p.name} style={{ color: p.color, margin: "3px 0", display: "flex", justifyContent: "space-between", gap: 24 }}>
          <span>{p.name}</span>
          <strong>{fmtFull(p.value)}</strong>
        </p>
      ))}
    </div>
  );
};

// ── Sub-components ────────────────────────────────────────────────────────────
const Input = ({ label, value, onChange, prefix, suffix, type = "number", min, step, placeholder }) => (
  <div style={{ marginBottom: 13 }}>
    <label style={{ display: "block", fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4b5563", marginBottom: 5 }}>{label}</label>

// Reusable step-increase editor
const StepEditor = ({ steps, setSteps, valueLabel, valueField, defaultValue }) => {
  const updateStep = (i, field, val) =>
    setSteps(s => s.map((st, idx) => idx === i ? { ...st, [field]: val } : st));
  const addStep = () =>
    setSteps(s => [...s, { year: (s[s.length - 1]?.year || 0) + 3, [valueField]: defaultValue }]);
  const removeStep = (i) => setSteps(s => s.filter((_, idx) => idx !== i));

  const inlineInput = (val, onChange) => (
    <input type="number" value={val} onChange={e => onChange(parseFloat(e.target.value) || 0)}
      style={{ background: "#080b10", border: "1px solid #1c1f2b", borderRadius: 6, padding: "7px 9px", color: "#e8eaf0", fontSize: 12, fontFamily: "monospace", outline: "none", width: "100%" }} />
  );

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 28px", gap: 5, marginBottom: 6 }}>
        {["Year", valueLabel, ""].map(h => <div key={h} style={{ fontSize: 9, color: "#374151", letterSpacing: "0.1em", textTransform: "uppercase" }}>{h}</div>)}
      </div>
      {steps.map((st, i) => (
        <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 28px", gap: 5, marginBottom: 5 }}>
          {inlineInput(st.year, v => updateStep(i, "year", v))}
          {inlineInput(st[valueField], v => updateStep(i, valueField, v))}
          <button onClick={() => removeStep(i)} style={{ background: "transparent", border: "1px solid #1c1f2b", borderRadius: 6, color: "#f87171", cursor: "pointer", fontSize: 13 }}>×</button>
        </div>
      ))}
      <button onClick={addStep} style={{ width: "100%", padding: "7px", background: "transparent", border: "1px dashed #1c1f2b", borderRadius: 6, color: "#4f8ef7", fontSize: 11, cursor: "pointer", marginTop: 2 }}>+ Add Step</button>
    </div>
  );
};

                        <div><span style={{ color: "#4b5563" }}>Property tax: </span><span style={{ color: "#e8eaf0", fontFamily: "monospace" }}>{fmt(home.purchasePrice * (home.taxRate != null ? home.taxRate / 100 : PROPERTY_TAX_BY_ZIP(zip)) / 12)}/mo</span></div>
                        <div><span style={{ color: "#4b5563" }}>HOA: </span><span style={{ color: "#e8eaf0", fontFamily: "monospace" }}>{fmt(home.hoaFee || 0)}/mo</span></div>
                        <div><span style={{ color: "#4b5563" }}>Total mo. cost: </span><span style={{ color: "#34d399", fontFamily: "monospace" }}>{fmt(pmt + home.purchasePrice * (home.taxRate != null ? home.taxRate / 100 : PROPERTY_TAX_BY_ZIP(zip)) / 12 + (home.hoaFee || 0))}</span></div>
                        <div style={{ gridColumn: "span 2" }}><span style={{ color: "#4b5563" }}>Total interest: </span><span style={{ color: "#f87171", fontFamily: "monospace" }}>{fmt(pmt * n - principal)}</span></div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}
          </Section>

          <Section title="Kids" icon="👶">
            <div style={{ background: "#080b10", border: "1px solid #111827", borderRadius: 7, padding: "9px 11px", fontSize: 11, marginBottom: 12 }}>
              <span style={{ color: "#4b5563" }}>ZIP {zip} COL: </span>
              <span style={{ color: COL_MULTIPLIER_BY_ZIP(zip) > 1.5 ? "#f87171" : COL_MULTIPLIER_BY_ZIP(zip) > 1.1 ? "#fbbf24" : COL_MULTIPLIER_BY_ZIP(zip) < 0.9 ? "#34d399" : "#9ca3af", fontFamily: "monospace", fontWeight: 700 }}>
                {COL_MULTIPLIER_BY_ZIP(zip).toFixed(2)}×
              </span>
              <span style={{ color: "#374151", marginLeft: 6 }}>· Auto: {fmt(childCostPerMonth(0, COL_MULTIPLIER_BY_ZIP(zip)))}/mo infant · {fmt(childCostPerMonth(8, COL_MULTIPLIER_BY_ZIP(zip)))}/mo school · {fmt(childCostPerMonth(15, COL_MULTIPLIER_BY_ZIP(zip)))}/mo teen</span>
            </div>
            {kids.map(k => {
              const updateKid = (field, val) => setKids(ks => ks.map(c => c.id === k.id ? { ...c, [field]: val } : c));
              const updatePhase = (i, field, val) => setKids(ks => ks.map(c => c.id === k.id ? { ...c, phases: c.phases.map((p, idx) => idx === i ? { ...p, [field]: val } : p) } : c));
              const addPhase = () => setKids(ks => ks.map(c => c.id === k.id ? { ...c, phases: [...c.phases, { years: 5, amount: 1000 }] } : c));
              const removePhase = (i) => setKids(ks => ks.map(c => c.id === k.id ? { ...c, phases: c.phases.filter((_, idx) => idx !== i) } : c));
              return (
                <div key={k.id} style={{ background: "#080b10", border: "1px solid #1c1f2b", borderRadius: 8, padding: "12px", marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <span style={{ fontSize: 12, fontFamily: "monospace", color: "#e8eaf0", fontWeight: 600 }}>Child born year {k.birthYear}</span>
                    <button onClick={() => removeKid(k.id)} style={{ background: "transparent", border: "none", color: "#f87171", cursor: "pointer", fontSize: 15, lineHeight: 1 }}>×</button>
                  </div>
                  {/* Cost mode toggle */}
                  <div style={{ display: "flex", background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 6, overflow: "hidden", marginBottom: 10 }}>
                    {["auto", "custom"].map(mode => (
                      <button key={mode} onClick={() => updateKid("costMode", mode)} style={{
                        flex: 1, padding: "6px 8px", border: "none", cursor: "pointer", fontSize: 10, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase",
                        background: k.costMode === mode ? "#4f8ef7" : "transparent",
                        color: k.costMode === mode ? "#fff" : "#6b7280", transition: "all 0.15s",
                      }}>{mode === "auto" ? "Auto (ZIP-indexed)" : "Custom Phases"}</button>
                    ))}
                  </div>
                  {k.costMode === "auto" ? (
                    <div style={{ fontSize: 10, color: "#374151" }}>
                      Using ZIP-indexed defaults · amounts inflate with CPI
                    </div>
                  ) : (
                    <div>
                      <div style={{ fontSize: 10, color: "#374151", marginBottom: 8, lineHeight: 1.5 }}>
                        Amounts in <span style={{ color: "#fbbf24" }}>today's dollars</span>, inflate with CPI. Costs drop to $0 after all phases.
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "60px 1fr 28px", gap: 5, marginBottom: 5 }}>
                        {["Years", "$/mo", ""].map(h => <div key={h} style={{ fontSize: 9, color: "#374151", letterSpacing: "0.08em", textTransform: "uppercase" }}>{h}</div>)}
                      </div>
                      {k.phases.map((phase, i) => (
                        <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr 28px", gap: 5, marginBottom: 5 }}>
                          <input type="number" value={phase.years} min={1} onChange={e => updatePhase(i, "years", parseInt(e.target.value) || 1)}
                            style={{ background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 6, padding: "6px 8px", color: "#e8eaf0", fontSize: 12, fontFamily: "monospace", outline: "none", width: "100%" }} />
                          <div style={{ position: "relative" }}>
                            <span style={{ position: "absolute", left: 8, top: "50%", transform: "translateY(-50%)", color: "#6b7280", fontSize: 12 }}>$</span>
                            <input type="number" value={phase.amount} min={0} onChange={e => updatePhase(i, "amount", parseFloat(e.target.value) || 0)}
                              style={{ background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 6, padding: "6px 8px 6px 18px", color: "#e8eaf0", fontSize: 12, fontFamily: "monospace", outline: "none", width: "100%", boxSizing: "border-box" }} />
                          </div>
                          <button onClick={() => removePhase(i)} style={{ background: "transparent", border: "1px solid #1c1f2b", borderRadius: 6, color: "#f87171", cursor: "pointer", fontSize: 12 }}>×</button>
                        </div>
                      ))}
                      <button onClick={addPhase} style={{ width: "100%", padding: "6px", background: "transparent", border: "1px dashed #1c1f2b", borderRadius: 6, color: "#4f8ef7", fontSize: 10, cursor: "pointer", marginTop: 2 }}>+ Add Phase</button>
                      <div style={{ marginTop: 8, fontSize: 10, color: "#374151" }}>
                        Total: {k.phases.reduce((s, p) => s + p.years, 0)} years covered
                        · Avg: {fmt(k.phases.reduce((s, p) => s + p.amount * p.years, 0) / Math.max(1, k.phases.reduce((s, p) => s + p.years, 0)))}/mo
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
              <div style={{ flex: 1 }}>
                <Input label="Born in year #" value={newKidYear} onChange={setNewKidYear} min={0} step={1} />
              </div>
              <button onClick={addKid} style={{
                padding: "9px 14px", background: "rgba(79,142,247,0.1)", border: "1px solid #4f8ef7",
                borderRadius: 7, color: "#4f8ef7", fontSize: 11, fontWeight: 700, cursor: "pointer", marginBottom: 13, whiteSpace: "nowrap",
              }}>+ Add</button>
            </div>
          </Section>

          <Section title="Planned Relocations" icon="🗺️">
            <p style={{ fontSize: 11, color: "#374151", margin: "0 0 10px", lineHeight: 1.6 }}>
              Rent and child costs re-index to the new ZIP's cost of living. State tax updates immediately.
            </p>
            {zipMoves.length === 0 && (
              <div style={{ fontSize: 10, color: "#374151", marginBottom: 10 }}>No moves planned.</div>
            )}
            {zipMoves.sort((a,b) => a.year - b.year).map(mv => (
              <div key={mv.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#080b10", border: "1px solid #1c1f2b", borderRadius: 7, padding: "8px 11px", marginBottom: 6 }}>
                <div>
                  <span style={{ fontSize: 12, fontFamily: "monospace", color: "#e8eaf0" }}>Year {mv.year} → {mv.zip}</span>
                  <span style={{ fontSize: 10, color: "#374151", marginLeft: 8 }}>
                    COL {COL_MULTIPLIER_BY_ZIP(mv.zip).toFixed(2)}× · {(STATE_TAX_BY_ZIP(mv.zip)*100).toFixed(1)}% state tax
                  </span>
                </div>
                <button onClick={() => removeMove(mv.id)} style={{ background: "transparent", border: "none", color: "#f87171", cursor: "pointer", fontSize: 15 }}>×</button>
              </div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "80px 1fr auto", gap: 6, alignItems: "flex-end" }}>
              <div>
                <label style={{ display: "block", fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4b5563", marginBottom: 5 }}>Year</label>
                <input type="number" value={newMoveYear} onChange={e => setNewMoveYear(parseInt(e.target.value) || 1)} min={1}
                  style={{ width: "100%", background: "#080b10", border: "1px solid #1c1f2b", borderRadius: 7, padding: "9px 8px", color: "#e8eaf0", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}
                  onFocus={e => e.target.style.borderColor="#4f8ef7"} onBlur={e => e.target.style.borderColor="#1c1f2b"} />
              </div>
              <div>
                <label style={{ display: "block", fontSize: 9, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4b5563", marginBottom: 5 }}>New ZIP</label>
                <input type="text" value={newMoveZip} onChange={e => setNewMoveZip(e.target.value)} placeholder="e.g. 90210" maxLength={5}
                  style={{ width: "100%", background: "#080b10", border: "1px solid #1c1f2b", borderRadius: 7, padding: "9px 10px", color: "#e8eaf0", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}
                  onFocus={e => e.target.style.borderColor="#4f8ef7"} onBlur={e => e.target.style.borderColor="#1c1f2b"}
                  onKeyDown={e => e.key === "Enter" && addMove()} />
              </div>
              <button onClick={addMove} disabled={newMoveZip.length < 5}
                style={{ padding: "9px 12px", background: newMoveZip.length >= 5 ? "rgba(79,142,247,0.1)" : "transparent", border: "1px solid", borderColor: newMoveZip.length >= 5 ? "#4f8ef7" : "#1c1f2b", borderRadius: 7, color: newMoveZip.length >= 5 ? "#4f8ef7" : "#374151", fontSize: 11, fontWeight: 700, cursor: newMoveZip.length >= 5 ? "pointer" : "default", whiteSpace: "nowrap" }}>
                + Add
              </button>
            </div>
          </Section>


        </div>

        {/* ── Right panel ── */}
        <div>

          {/* Stat cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 }}>
            {[
              { label: `Nominal in ${projYears}y`, value: fmt(final.netWorthNominal), sub: "today's dollars × inflation", color: "#4f8ef7" },
              { label: `Real in ${projYears}y`, value: fmt(final.netWorthReal), sub: "in today's purchasing power", color: "#34d399" },
              { label: "Inflation Erosion", value: fmt(final.netWorthNominal - final.netWorthReal), sub: `${((1 - final.netWorthReal / Math.max(1, final.netWorthNominal)) * 100).toFixed(0)}% of nominal lost`, color: "#f87171" },
            ].map(c => (
              <div key={c.label} style={{ background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 12, padding: "15px 16px" }}>
                <div style={{ fontSize: 9, color: "#374151", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 5 }}>{c.label}</div>
                <div style={{ fontSize: 22, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, color: c.color, marginBottom: 3 }}>{c.value}</div>
                <div style={{ fontSize: 10, color: "#1f2937" }}>{c.sub}</div>
              </div>
            ))}
          </div>

          {/* Main chart */}
          <div style={{ background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 14, padding: "18px", marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
              <div style={{ display: "flex", gap: 6 }}>
                {CHART_TABS.map(t => (
                  <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                    padding: "6px 12px", borderRadius: 6, border: "1px solid",
                    borderColor: activeTab === t.id ? "#4f8ef7" : "#1c1f2b",
                    background: activeTab === t.id ? "rgba(79,142,247,0.12)" : "transparent",
                    color: activeTab === t.id ? "#4f8ef7" : "#4b5563",
                    fontSize: 11, fontWeight: 700, cursor: "pointer",
                  }}>{t.label}</button>
                ))}
              </div>
              <button onClick={() => setShowReal(r => !r)} style={{
                padding: "6px 12px", borderRadius: 6, border: "1px solid",
                borderColor: showReal ? "#34d399" : "#1c1f2b",
                background: showReal ? "rgba(52,211,153,0.08)" : "transparent",
                color: showReal ? "#34d399" : "#4b5563",
                fontSize: 11, fontWeight: 700, cursor: "pointer",
              }}>
                {showReal ? "✓ Showing Real $" : "Show Real $"}
              </button>
            </div>

            <div style={{ width: "100%", height: 260 }}>
              <ResponsiveContainer width="100%" height="100%">
                <LineChart data={data} margin={{ top: 4, right: 8, left: 8, bottom: 4 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#111827" />
                  <XAxis dataKey="year" stroke="#1f2937" tick={{ fill: "#374151", fontSize: 10 }} tickFormatter={v => `Yr ${v}`} />
                  <YAxis stroke="#1f2937" tick={{ fill: "#374151", fontSize: 10 }} tickFormatter={v => fmt(v)} width={60} />
                  <Tooltip content={<CustomTooltip />} />
                  <Legend wrapperStyle={{ fontSize: 11, color: "#6b7280" }} />
                  {activeTab === "networth" && <Line type="monotone" dataKey="netWorthNominal" name="Total Net Worth" stroke="#4f8ef7" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />}
                  {activeTab === "networth" && showReal && <Line type="monotone" dataKey="netWorthReal" name="Real Total NW (today's $)" stroke="#34d399" strokeWidth={2} dot={false} strokeDasharray="6 3" activeDot={{ r: 4 }} />}
                  {activeTab === "networth" && home.enabled && <Line type="monotone" dataKey="liquidNW" name="Liquid NW" stroke="#a78bfa" strokeWidth={1.5} dot={false} strokeDasharray="4 2" activeDot={{ r: 3 }} />}
                  {activeTab === "networth" && home.enabled && <Line type="monotone" dataKey="homeEquity" name="Home Equity" stroke="#34d399" strokeWidth={1.5} dot={false} activeDot={{ r: 3 }} />}
                  {activeTab === "salary" && <Line type="monotone" dataKey="combinedSalary" name="Nominal Salary" stroke="#4f8ef7" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />}
                  {activeTab === "salary" && showReal && <Line type="monotone" dataKey="combinedSalaryReal" name="Real Salary (today's $)" stroke="#34d399" strokeWidth={2} dot={false} strokeDasharray="6 3" activeDot={{ r: 4 }} />}
                  {activeTab === "expenses" && <Line type="monotone" dataKey="monthlyExpenses" name="Nominal Mo. Expenses" stroke="#fb923c" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />}
                  {activeTab === "expenses" && showReal && <Line type="monotone" dataKey="monthlyExpensesReal" name="Real Mo. Expenses (today's $)" stroke="#34d399" strokeWidth={2} dot={false} strokeDasharray="6 3" activeDot={{ r: 4 }} />}
                  {activeTab === "savings" && <Line type="monotone" dataKey="monthlySavings" name="Nominal Mo. Savings" stroke="#a78bfa" strokeWidth={2} dot={false} activeDot={{ r: 4 }} />}
                  {activeTab === "savings" && showReal && <Line type="monotone" dataKey="monthlySavingsReal" name="Real Mo. Savings" stroke="#34d399" strokeWidth={2} dot={false} strokeDasharray="6 3" activeDot={{ r: 4 }} />}
                  {activeTab === "savings" && <ReferenceLine y={0} stroke="#374151" strokeDasharray="4 4" />}
                </LineChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* Inflation scenario comparison */}
          <div style={{ background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 14, padding: "18px", marginBottom: 16 }}>
            <h3 style={{ margin: "0 0 14px", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4b5563" }}>Inflation Impact: Side-by-Side Comparison</h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 }}>
              {scenarios.map(s => (
                <div key={s.key} style={{
                  background: "#080b10", border: `1px solid ${inflationKey === s.key && !useCustomInflation ? s.color : "#1c1f2b"}`,
                  borderRadius: 10, padding: "14px",
                  opacity: useCustomInflation ? 0.6 : 1,
                }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: s.color, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2 }}>{s.label}</div>
                  <div style={{ fontSize: 10, color: "#374151", marginBottom: 10 }}>{s.pct}% / yr · {s.desc}</div>
                  <div style={{ marginBottom: 6 }}>
                    <div style={{ fontSize: 9, color: "#374151", textTransform: "uppercase", letterSpacing: "0.08em" }}>Nominal</div>
                    <div style={{ fontSize: 17, fontFamily: "monospace", fontWeight: 700, color: "#4f8ef7" }}>{fmt(s.finalNominal)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 9, color: "#374151", textTransform: "uppercase", letterSpacing: "0.08em" }}>Real (today's $)</div>
                    <div style={{ fontSize: 17, fontFamily: "monospace", fontWeight: 700, color: s.color }}>{fmt(s.finalReal)}</div>
                  </div>
                  <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid #111827", fontSize: 10, color: "#374151" }}>
                    Erosion: <span style={{ color: "#f87171", fontFamily: "monospace" }}>
                      {((1 - s.finalReal / Math.max(1, s.finalNominal)) * 100).toFixed(0)}%
                    </span> of nominal
                  </div>
                </div>
              ))}
            </div>

            <div style={{ width: "100%", height: 200 }}>
              <ResponsiveContainer width="100%" height="100%">
                <LineChart margin={{ top: 4, right: 8, left: 8, bottom: 4 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#111827" />
                  <XAxis dataKey="year" type="number" domain={[0, projYears]} stroke="#1f2937" tick={{ fill: "#374151", fontSize: 10 }} tickFormatter={v => `Yr ${v}`} allowDuplicatedCategory={false} />
                  <YAxis stroke="#1f2937" tick={{ fill: "#374151", fontSize: 10 }} tickFormatter={v => fmt(v)} width={60} />
                  <Tooltip content={<CustomTooltip />} />
                  <Legend wrapperStyle={{ fontSize: 10, color: "#6b7280" }} />
                  {scenarios[0] && <Line data={scenarios[0].data} type="monotone" dataKey="netWorthReal" name={`${scenarios[0].label} (${scenarios[0].pct}%)`} stroke={scenarios[0].color} strokeWidth={1.5} dot={false} activeDot={{ r: 3 }} />}
                  {scenarios[1] && <Line data={scenarios[1].data} type="monotone" dataKey="netWorthReal" name={`${scenarios[1].label} (${scenarios[1].pct}%)`} stroke={scenarios[1].color} strokeWidth={1.5} dot={false} activeDot={{ r: 3 }} />}
                  {scenarios[2] && <Line data={scenarios[2].data} type="monotone" dataKey="netWorthReal" name={`${scenarios[2].label} (${scenarios[2].pct}%)`} stroke={scenarios[2].color} strokeWidth={1.5} dot={false} activeDot={{ r: 3 }} />}
                </LineChart>
              </ResponsiveContainer>
            </div>
            <p style={{ fontSize: 10, color: "#1f2937", margin: "8px 0 0", textAlign: "center" }}>Real (inflation-adjusted) net worth across all three inflation scenarios</p>
          </div>

          {/* Year-by-year table */}
          <div style={{ background: "#0d1117", border: "1px solid #1c1f2b", borderRadius: 14, padding: "18px", overflowX: "auto" }}>
            <h3 style={{ margin: "0 0 14px", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4b5563" }}>Year-by-Year Breakdown</h3>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>
              <thead>
                <tr>
                  {(home.enabled ? ["Year", "CPI×", "Salary", "Taxes/yr", "Mo.Expenses", "Mo.Savings", "Liquid NW", "Home Equity", "Total NW", "Real NW"] : ["Year", "CPI×", "Salary", "Taxes/yr", "Mo.Expenses", "Mo.Savings", "Nominal NW", "Real NW"]).map(h => (
                    <th key={h} style={{ textAlign: "right", padding: "7px 10px", color: "#374151", fontWeight: 700, fontSize: 9, letterSpacing: "0.08em", textTransform: "uppercase", borderBottom: "1px solid #111827" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {data.filter((_, i) => i % (projYears > 20 ? 5 : projYears > 10 ? 2 : 1) === 0).map(row => (
                  <tr key={row.year} style={{ borderBottom: "1px solid #080b10" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#0f1117"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{row.year}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#374151" }}>{row.inflationFactor}×</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{fmt(row.partnerSalary > 0 ? row.combinedSalary : row.salary)}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{fmt(row.annualTax)}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{fmt(row.monthlyExpenses)}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: row.monthlySavings >= 0 ? "#34d399" : "#f87171" }}>{fmt(row.monthlySavings)}</td>
                    {home.enabled ? (
                      <>
                        <td style={{ textAlign: "right", padding: "8px 10px", color: "#a78bfa", fontWeight: 600 }}>{fmt(row.liquidNW)}</td>
                        <td style={{ textAlign: "right", padding: "8px 10px", color: "#34d399", fontWeight: 600 }}>{fmt(row.homeEquity)}</td>
                        <td style={{ textAlign: "right", padding: "8px 10px", color: "#4f8ef7", fontWeight: 600 }}>{fmt(row.netWorthNominal)}</td>
                      </>
                    ) : (
                      <td style={{ textAlign: "right", padding: "8px 10px", color: "#4f8ef7", fontWeight: 600 }}>{fmt(row.netWorthNominal)}</td>
                    )}
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#34d399", fontWeight: 600 }}>{fmt(row.netWorthReal)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <p style={{ textAlign: "right", fontSize: 10, color: "#1f2937", marginTop: 10 }}>
            Projections are illustrative only · Not financial advice · Tax estimates are approximate
          </p>
        </div>
      </div>
    </div>
  );
}


    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<NetWorthCalculator />);
    } catch(e) {
      document.getElementById('root').innerHTML = '<pre style="color:#f87171;padding:20px">' + e.message + '</pre>';
    }
  </script>
</body>
</html>
