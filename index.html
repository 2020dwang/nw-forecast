// ── Tax helpers ───────────────────────────────────────────────────────────────
const FED_BRACKETS_SINGLE_2025 = [
  { min: 0,       max: 11925,    rate: 0.10 },
  { min: 11925,   max: 48475,    rate: 0.12 },
  { min: 48475,   max: 103350,   rate: 0.22 },
  { min: 103350,  max: 197300,   rate: 0.24 },
  { min: 197300,  max: 250525,   rate: 0.32 },
  { min: 250525,  max: 626350,   rate: 0.35 },
  { min: 626350,  max: Infinity, rate: 0.37 },
];
const STANDARD_DEDUCTION_SINGLE = 15000;
const STANDARD_DEDUCTION_MFJ    = 30000;

const FED_BRACKETS_MFJ_2025 = [
  { min: 0,        max: 23850,    rate: 0.10 },
  { min: 23850,    max: 96950,    rate: 0.12 },
  { min: 96950,    max: 206700,   rate: 0.22 },
  { min: 206700,   max: 394600,   rate: 0.24 },
  { min: 394600,   max: 501050,   rate: 0.32 },
  { min: 501050,   max: 751600,   rate: 0.35 },
  { min: 751600,   max: Infinity, rate: 0.37 },
];

const STATE_TAX_BY_ZIP = (zip) => {
  const p = parseInt(zip?.slice(0, 3) || "0", 10);
  if (p >= 10  && p <= 149) return 0.0685;
  if (p >= 900 && p <= 961) return 0.0813;
  if (p >= 600 && p <= 629) return 0.0495;
  if (p >= 770 && p <= 779) return 0.0000;
  if (p >= 320 && p <= 349) return 0.0000;
  if (p >= 980 && p <= 994) return 0.0000;
  if (p >= 970 && p <= 979) return 0.0875;
  if (p >= 300 && p <= 319) return 0.0575;
  if (p >= 150 && p <= 196) return 0.0307;
  if (p >= 200 && p <= 212) return 0.0575;
  if (p >= 430 && p <= 459) return 0.0399;
  if (p >= 480 && p <= 499) return 0.0425;
  if (p >= 550 && p <= 567) return 0.0985;
  if (p >= 700 && p <= 729) return 0.0600;
  if (p >= 850 && p <= 865) return 0.0259;
  if (p >= 800 && p <= 816) return 0.0450;
  if (p >= 890 && p <= 898) return 0.0000;
  return 0.05;
};

// Effective property tax rate by ZIP (annual % of property value)
// Source: Tax Foundation / Census Bureau state averages, adjusted for metro vs rural
const PROPERTY_TAX_BY_ZIP = (zip) => {
  const p = parseInt(zip?.slice(0, 3) || "0", 10);
  // Very high: NJ, IL, CT, NH, WI, TX (no income tax, high property tax)
  if (p >= 70  && p <= 89)  return 0.0220; // New Jersey
  if (p >= 600 && p <= 629) return 0.0205; // Illinois
  if (p >= 60  && p <= 69)  return 0.0190; // Connecticut
  if (p >= 30  && p <= 38)  return 0.0180; // New Hampshire
  if (p >= 530 && p <= 549) return 0.0175; // Wisconsin
  if (p >= 750 && p <= 799) return 0.0165; // Texas
  if (p >= 770 && p <= 779) return 0.0165; // Houston
  // High: NY, PA, OH, MI, IA, NE, VT, RI
  if (p >= 10  && p <= 149) return 0.0158; // New York metro
  if (p >= 100 && p <= 102) return 0.0120; // Manhattan (assessed lower)
  if (p >= 150 && p <= 196) return 0.0150; // Pennsylvania
  if (p >= 430 && p <= 459) return 0.0148; // Ohio
  if (p >= 480 && p <= 499) return 0.0142; // Michigan
  if (p >= 500 && p <= 528) return 0.0145; // Iowa
  if (p >= 680 && p <= 693) return 0.0148; // Nebraska
  if (p >= 50  && p <= 59)  return 0.0168; // Vermont
  if (p >= 28  && p <= 29)  return 0.0145; // Rhode Island
  // Moderate: CA, WA, OR, CO, MN, MO, MD, VA, NC, GA
  if (p >= 900 && p <= 961) return 0.0073; // California (Prop 13 limited)
  if (p >= 980 && p <= 994) return 0.0092; // Washington
  if (p >= 970 && p <= 979) return 0.0090; // Oregon
  if (p >= 800 && p <= 816) return 0.0049; // Colorado
  if (p >= 550 && p <= 567) return 0.0108; // Minnesota
  if (p >= 630 && p <= 658) return 0.0096; // Missouri
  if (p >= 200 && p <= 212) return 0.0098; // Maryland / DC
  if (p >= 220 && p <= 246) return 0.0082; // Virginia
  if (p >= 270 && p <= 289) return 0.0083; // North Carolina
  if (p >= 300 && p <= 319) return 0.0091; // Georgia
  if (p >= 850 && p <= 865) return 0.0062; // Arizona
  if (p >= 890 && p <= 898) return 0.0053; // Nevada
  if (p >= 787 && p <= 788) return 0.0165; // Austin TX (higher effective)
  // Low: HI, AL, SC, DC, LA, WV, DE
  if (p >= 967 && p <= 969) return 0.0028; // Hawaii
  if (p >= 350 && p <= 369) return 0.0039; // Alabama
  if (p >= 290 && p <= 299) return 0.0054; // South Carolina
  if (p >= 700 && p <= 729) return 0.0055; // Louisiana
  if (p >= 240 && p <= 268) return 0.0058; // West Virginia / Virginia rural
  if (p >= 197 && p <= 199) return 0.0054; // Delaware
  if (p >= 386 && p <= 397) return 0.0052; // Mississippi
  if (p >= 370 && p <= 385) return 0.0067; // Tennessee
  if (p >= 716 && p <= 729) return 0.0062; // Arkansas
  return 0.0100; // national average baseline
};

function calcFederalTax(income, inflFactor = 1) {
  const deduction = STANDARD_DEDUCTION_SINGLE * inflFactor;
  const taxable = Math.max(0, income - deduction);
  let tax = 0;
  for (const b of FED_BRACKETS_SINGLE_2025) {
    const bMin = b.min * inflFactor;
    const bMax = b.max === Infinity ? Infinity : b.max * inflFactor;
    if (taxable <= bMin) break;
    tax += (Math.min(taxable, bMax) - bMin) * b.rate;
  }
  return tax;
}

function calcTotalTax(income, zip, inflFactor = 1) {
  const federal = calcFederalTax(income, inflFactor);
  const ssWageCap = 176100 * inflFactor;
  const fica = Math.min(income, ssWageCap) * 0.062 + income * 0.0145;
  const deduction = STANDARD_DEDUCTION_SINGLE * inflFactor;
  const state = Math.max(0, income - deduction) * STATE_TAX_BY_ZIP(zip);
  return federal + fica + state;
}

// ── Cost-of-living multiplier by ZIP ─────────────────────────────────────────
// Base costs calibrated to national mid-cost average (multiplier = 1.0).
// Derived from MIT Living Wage calculator, USDA child expenditure data, regional COL indices.
const COL_MULTIPLIER_BY_ZIP = (zip) => {
  const p = parseInt(zip?.slice(0, 3) || "0", 10);
  // Very high cost
  if (p >= 100 && p <= 102) return 2.10; // Manhattan
  if (p >= 10  && p <= 119) return 1.85; // NYC metro
  if (p >= 940 && p <= 941) return 2.00; // San Francisco
  if (p >= 943 && p <= 944) return 1.90; // Silicon Valley
  if (p >= 900 && p <= 902) return 1.75; // LA core
  if (p >= 903 && p <= 912) return 1.55; // LA metro / OC
  if (p >= 980 && p <= 981) return 1.80; // Seattle
  if (p >= 200 && p <= 202) return 1.85; // DC
  if (p >= 20  && p <= 24)  return 1.70; // Boston
  if (p >= 941 && p <= 942) return 1.65; // East Bay
  // High cost
  if (p >= 606 && p <= 607) return 1.45; // Chicago core
  if (p >= 600 && p <= 629) return 1.30; // Chicago metro
  if (p >= 331 && p <= 334) return 1.40; // Miami
  if (p >= 800 && p <= 802) return 1.40; // Denver
  if (p >= 787 && p <= 788) return 1.35; // Austin
  if (p >= 970 && p <= 972) return 1.40; // Portland OR
  if (p >= 919 && p <= 922) return 1.50; // San Diego
  if (p >= 150 && p <= 152) return 1.20; // Philadelphia
  if (p >= 770 && p <= 772) return 1.25; // Houston
  if (p >= 750 && p <= 752) return 1.20; // Dallas
  if (p >= 303 && p <= 304) return 1.25; // Atlanta
  if (p >= 850 && p <= 853) return 1.20; // Phoenix
  if (p >= 890 && p <= 891) return 1.30; // Las Vegas
  // Low cost: rural South, Midwest, Appalachia
  if (p >= 350 && p <= 369) return 0.82; // Alabama
  if (p >= 386 && p <= 397) return 0.80; // Mississippi
  if (p >= 716 && p <= 729) return 0.83; // Arkansas / rural Louisiana
  if (p >= 570 && p <= 577) return 0.85; // South Dakota
  if (p >= 580 && p <= 588) return 0.85; // North Dakota
  if (p >= 240 && p <= 246) return 0.83; // West Virginia
  if (p >= 400 && p <= 427) return 0.88; // Kentucky
  if (p >= 370 && p <= 385) return 0.87; // Tennessee (non-Nashville)
  if (p >= 460 && p <= 479) return 0.88; // Indiana
  if (p >= 500 && p <= 528) return 0.90; // Iowa
  return 1.0; // national average baseline
};


// Median 1BR rent baseline by ZIP (today's dollars, national median ~$1,500)
const MEDIAN_RENT_BY_ZIP = (zip) => {
  return Math.round(1500 * COL_MULTIPLIER_BY_ZIP(zip));
};

// Base costs are national mid-cost baselines; scaled by COL factor for locality
function childCostPerMonth(childAgeYears, colMultiplier = 1.0) {
  if (childAgeYears < 0)  return 0;
  if (childAgeYears < 1)  return Math.round(2200 * colMultiplier);
  if (childAgeYears < 5)  return Math.round(1800 * colMultiplier);
  if (childAgeYears < 13) return Math.round(1100 * colMultiplier);
  if (childAgeYears < 18) return Math.round(1300 * colMultiplier);
  return 0;
}

// Custom phase lookup: phases = [{years, amount}, ...] in today's dollars
// Returns 0 once all phases are exhausted
function childCostCustom(childAgeYears, phases) {
  if (childAgeYears < 0) return 0;
  let cursor = 0;
  for (const phase of phases) {
    if (childAgeYears < cursor + phase.years) return phase.amount;
    cursor += phase.years;
  }
  return 0;
}

function calcFederalTaxMFJ(combinedIncome, inflFactor = 1) {
  const deduction = STANDARD_DEDUCTION_MFJ * inflFactor;
  const taxable = Math.max(0, combinedIncome - deduction);
  let tax = 0;
  for (const b of FED_BRACKETS_MFJ_2025) {
    const bMin = b.min * inflFactor;
    const bMax = b.max === Infinity ? Infinity : b.max * inflFactor;
    if (taxable <= bMin) break;
    tax += (Math.min(taxable, bMax) - bMin) * b.rate;
  }
  return tax;
}

function calcTotalTaxMFJ(income1, income2, zip, inflFactor = 1) {
  const combined = income1 + income2;
  const federal = calcFederalTaxMFJ(combined, inflFactor);
  // FICA computed individually (SS cap applies per person)
  const ssWageCap = 176100 * inflFactor;
  const fica1 = Math.min(income1, ssWageCap) * 0.062 + income1 * 0.0145;
  const fica2 = Math.min(income2, ssWageCap) * 0.062 + income2 * 0.0145;
  const deduction = STANDARD_DEDUCTION_MFJ * inflFactor;
  const state = Math.max(0, combined - deduction) * STATE_TAX_BY_ZIP(zip);
  return federal + fica1 + fica2 + state;
}

// ── Inflation presets ─────────────────────────────────────────────────────────
const INFLATION_PRESETS = {
  conservative: { label: "Conservative", pct: 2.0, color: "#34d399", desc: "Fed target / low-inflation era" },
  historical:   { label: "Historical Avg", pct: 3.1, color: "#fbbf24", desc: "US CPI avg since 1926" },
  optimistic:   { label: "Elevated",       pct: 5.0, color: "#f87171", desc: "1970s-style / persistent inflation" },
};

// ── Projection engine ─────────────────────────────────────────────────────────
function runProjection(params) {
  const {
    currentNetWorth, currentSalary,
    salaryGrowthMode, salaryGrowthPct, salarySteps,
    monthlyRent, rentGrowthMode, rentGrowthPct, rentSteps,
    monthlyOtherExpenses, otherGrowthMode, otherGrowthPct, otherSteps,
    zip, zipMoves,
    investmentReturnPct, inflationPct,
    kids, projectionYears,
    currentAge: currentAgeParam,
    partnerAge: partnerAgeParam,
    partner,
    home,
    retirement,
    loans,
    uninvested,
    ss,
    annualReturns,   // optional: array of per-year nominal return % overrides
    annualInflations, // optional: array of per-year inflation % overrides
  } = params;

  // nominalMonthlyReturn is computed per-year when annualReturns array is provided
  const baseMonthlyReturn = Math.pow(1 + investmentReturnPct / 100, 1 / 12) - 1;
  // Adjust starting NW: if loans included in NW, subtract them from the entered NW
  // (user enters non-loan NW separately, loans are tracked as a liability)
  const loanLiability = loans?.enabled ? (loans?.amount || 0) : 0;
  const partnerLoanLiability = loans?.partnerEnabled ? (loans?.partnerAmount || 0) : 0;
  let netWorthNominal = currentNetWorth - loanLiability;
  let partnerNWAdded = false;
  let partnerJoined = false;

  // Home purchase state
  let homeActive = false;
  let propertyValue = 0;
  let mortgageBalance = 0;
  let monthlyMortgagePayment = 0;
  if (home?.enabled) {
    const purchasePrice = home.purchasePrice || 0;
    const downFrac = (home.downPct || 20) / 100;
    const principal = purchasePrice * (1 - downFrac);
    const monthlyRate = (home.interestRate || 6) / 100 / 12;
    const n = (home.termYears || 30) * 12;
    monthlyMortgagePayment = monthlyRate === 0 ? principal / n
      : principal * monthlyRate * Math.pow(1 + monthlyRate, n) / (Math.pow(1 + monthlyRate, n) - 1);
  }
  // Student loan balances (tracked separately from liquid NW)
  let loanBalance = (loans?.enabled && loans?.amount > 0) ? (loans.amount) : 0;
  let partnerLoanBalance = (loans?.partnerEnabled && loans?.partnerAmount > 0) ? (loans.partnerAmount) : 0;

  let salary = currentSalary;
  // Partner values stored in today's dollars; inflated to nominal on join year
  let partnerSalary = 0;
  let partnerRent   = 0;
  let partnerOther  = 0;
  let rent = monthlyRent;
  let other = monthlyOtherExpenses;
  const data = [];
  let inflationCumulative = 1.0; // tracks actual cumulative inflation for MC paths

  // Sort moves chronologically
  const sortedMoves = [...(zipMoves || [])].sort((a, b) => a.year - b.year);
  let activeZip = zip;
  let prevColMultiplier = COL_MULTIPLIER_BY_ZIP(zip);

  for (let year = 0; year <= projectionYears; year++) {
    // Use actual cumulative inflation for path-dependent MC, else analytical
    const yearInflationRate = (annualInflations && annualInflations[year] != null && year > 0)
      ? annualInflations[year] : inflationPct;
    if (year > 0) inflationCumulative *= (1 + yearInflationRate / 100);
    const inflationFactor = annualInflations ? inflationCumulative : Math.pow(1 + inflationPct / 100, year);
    // Activate partner finances at marriageYear — inflate their values to nominal at that year
    const partnerActive = partner?.enabled && year >= (partner.marriageYear ?? 0);
    if (partner?.enabled && !partnerJoined && year >= (partner.marriageYear ?? 0)) {
      partnerSalary = (partner.salary || 0) * inflationFactor;
      partnerRent   = (partner.rent   || 0) * inflationFactor;
      partnerOther  = (partner.otherExp || 0) * inflationFactor;
      partnerJoined = true;
    }
    if (partner?.enabled && !partnerNWAdded && year >= (partner.marriageYear ?? 0)) {
      netWorthNominal += (partner.netWorth || 0) - partnerLoanLiability;
      partnerNWAdded = true;
    }
    const deflator = 1 / inflationFactor;

    // Apply ZIP move: update tax jurisdiction, re-index rent to new market
    const moveThisYear = sortedMoves.find(m => m.year === year);
    if (moveThisYear && moveThisYear.zip.length >= 5) {
      const newColMultiplier = COL_MULTIPLIER_BY_ZIP(moveThisYear.zip);
      if (prevColMultiplier > 0 && !homeActive) rent = rent * (newColMultiplier / prevColMultiplier);
      prevColMultiplier = newColMultiplier;
      activeZip = moveThisYear.zip;
    }

    // Home purchase: deduct down payment from liquid NW, track mortgage + property
    if (home?.enabled && !homeActive && year === (home.purchaseYear ?? 0)) {
      const purchasePrice = home.purchasePrice || 0;
      const downAmt = purchasePrice * (home.downPct || 20) / 100;
      const giftAmt = home.familyGiftEnabled ? Math.min(home.familyGiftAmount || 0, downAmt) : 0;
      netWorthNominal -= (downAmt - giftAmt); // only out-of-pocket portion leaves liquid NW
      propertyValue = purchasePrice; // purchase at today's entered price
      mortgageBalance = purchasePrice * (1 - (home.downPct || 20) / 100);
      rent = 0; // rent replaced by mortgage payment
      homeActive = true;
    }
    // Appreciate property and amortize mortgage each year (not in purchase year)
    if (homeActive && year > (home.purchaseYear ?? 0)) {
      propertyValue *= (1 + (home.appreciationPct || inflationPct) / 100);
      // Amortize 12 months of mortgage payments
      const monthlyRate = (home.interestRate || 6) / 100 / 12;
      for (let m = 0; m < 12; m++) {
        const interestPmt = mortgageBalance * monthlyRate;
        const principalPmt = Math.max(0, monthlyMortgagePayment - interestPmt);
        mortgageBalance = Math.max(0, mortgageBalance - principalPmt);
      }
    }

    if (year > 0) {
      // Salary (COLA + real raise)
      if (salaryGrowthMode === "percentage") {
        salary = salary * (1 + salaryGrowthPct / 100 + inflationPct / 100);
      } else {
        const step = salarySteps.find(s => s.year === year);
        if (step) salary = step.salary * Math.pow(1 + inflationPct / 100, year);
        else salary = salary * (1 + inflationPct / 100);
      }
      // Partner salary: mode-aware, same logic as primary
      if (partnerActive) {
        if ((partner.salaryMode || "percentage") === "percentage") {
          partnerSalary = partnerSalary * (1 + (partner.salaryGrowthPct || 0) / 100 + inflationPct / 100);
        } else {
          const step = (partner.salarySteps || []).find(s => s.year === year);
          if (step) partnerSalary = step.salary * Math.pow(1 + inflationPct / 100, year);
          else partnerSalary = partnerSalary * (1 + inflationPct / 100);
        }
        if ((partner.rentMode || "percentage") === "percentage") {
          partnerRent = partnerRent * (1 + (partner.rentGrowthPct || 0) / 100 + inflationPct / 100);
        } else {
          const step = (partner.rentSteps || []).find(s => s.year === year);
          if (step) partnerRent = step.amount * Math.pow(1 + inflationPct / 100, year);
          else partnerRent = partnerRent * (1 + inflationPct / 100);
        }
        if ((partner.otherMode || "percentage") === "percentage") {
          partnerOther = partnerOther * (1 + (partner.otherGrowthPct || 0) / 100 + inflationPct / 100);
        } else {
          const step = (partner.otherSteps || []).find(s => s.year === year);
          if (step) partnerOther = step.amount * Math.pow(1 + inflationPct / 100, year);
          else partnerOther = partnerOther * (1 + inflationPct / 100);
        }
      }
      // Rent: always inflates at CPI (suppressed once home is purchased)
      if (!homeActive) {
        if (rentGrowthMode === "percentage") {
          rent = rent * (1 + rentGrowthPct / 100 + inflationPct / 100);
        } else {
          const step = rentSteps.find(s => s.year === year);
          if (step) rent = step.amount * Math.pow(1 + inflationPct / 100, year);
          else rent = rent * (1 + inflationPct / 100);
        }
      }
      // Other expenses: same logic
      if (otherGrowthMode === "percentage") {
        other = other * (1 + otherGrowthPct / 100 + inflationPct / 100);
      } else {
        const step = otherSteps.find(s => s.year === year);
        if (step) other = step.amount * Math.pow(1 + inflationPct / 100, year);
        else other = other * (1 + inflationPct / 100);
      }
    }

    // Retirement: zero out salary at retirement year, add pension
    // Social Security income
    let ssIncome = 0;
    if (ss?.enabled) {
      const FRA = 67;
      // Benefit adjustment factor based on claim age
      const ssBenefitFactor = (claimAge) => {
        const monthsDiff = (claimAge - FRA) * 12;
        if (monthsDiff >= 0) return 1 + monthsDiff * 0.08 / 12; // +8%/yr delayed
        if (monthsDiff >= -36) return 1 + monthsDiff * (5/9) / 100;
        return 1 + (-36) * (5/9) / 100 + (monthsDiff + 36) * (5/12) / 100;
      };
      const currentAge = currentAgeParam || 35;
      const ssClaimYear = Math.max(0, (ss.claimAge || 67) - currentAge);
      if (ss.mySSEnabled !== false && year >= ssClaimYear) {
        const factor = ssBenefitFactor(ss.claimAge || 67);
        ssIncome += (ss.calculatedBenefit || 0) * 12 * factor * inflationFactor;
      }
      if (partnerActive && partner?.enabled && ss.partnerSSEnabled) {
        const partnerAgeVal = partnerAgeParam || 35;
        const partnerClaimYear = Math.max(0, (ss.partnerClaimAge || 67) - partnerAgeVal);
        if (year >= partnerClaimYear) {
          const factor = ssBenefitFactor(ss.partnerClaimAge || 67);
          ssIncome += (ss.partnerCalculatedBenefit || 0) * 12 * factor * inflationFactor;
        }
      }
    }

    let pensionIncome = 0;
    if (retirement?.enabled) {
      const retireYear = (retirement.retireAge || 65) - (currentAgeParam || 35);
      if (year >= retireYear) {
        salary = 0;
      }
      // Pension starts at pensionStartAge, independent of retirement age
      if (retirement.pensionEnabled && retirement.myPensionEnabled !== false) {
        const pensionYear = (retirement.pensionStartAge || retirement.retireAge || 65) - (currentAgeParam || 35);
        if (year >= pensionYear) {
          pensionIncome = (retirement.pensionAmount || 0) * inflationFactor;
        }
      }
      if (partnerActive) {
        const partnerRetireYear = (retirement.partnerRetireAge || 65) - (partnerAgeParam || 35);
        if (year >= partnerRetireYear) {
          partnerSalary = 0;
        }
        if (retirement.partnerPensionEnabled) {
          const partnerPensionYear = (retirement.partnerPensionStartAge || retirement.partnerRetireAge || 65) - (partnerAgeParam || 35);
          if (year >= partnerPensionYear) {
            pensionIncome += (retirement.partnerPensionAmount || 0) * inflationFactor;
          }
        }
      }
    }

    // Pension is ordinary income (federal + state) but NOT subject to FICA
    // We compute tax on earned income + pension together, then subtract FICA on earned only
    let annualTax, monthlyAfterTax;
    const totalEarnedIncome = salary + (partnerActive ? partnerSalary : 0);
    if (partnerActive) {
      // Federal + state on earned + pension; FICA on earned only
      const totalWithPension = totalEarnedIncome + pensionIncome + ssIncome * 0.85;
      const federalOnTotal = calcFederalTaxMFJ(totalWithPension, inflationFactor);
      const ssWageCap = 176100 * inflationFactor;
      const stateOnTotal = Math.max(0, totalWithPension - STANDARD_DEDUCTION_MFJ * inflationFactor) * STATE_TAX_BY_ZIP(activeZip);
      const fica1 = Math.min(salary, ssWageCap) * 0.062 + salary * 0.0145;
      const fica2 = Math.min(partnerSalary, ssWageCap) * 0.062 + partnerSalary * 0.0145;
      annualTax = federalOnTotal + stateOnTotal + fica1 + fica2;
      monthlyAfterTax = (totalEarnedIncome + pensionIncome + ssIncome - annualTax) / 12;
    } else {
      const totalWithPension = salary + pensionIncome + ssIncome * 0.85;
      const federalOnTotal = calcFederalTax(totalWithPension, inflationFactor);
      const ssWageCap = 176100 * inflationFactor;
      const stateOnTotal = Math.max(0, totalWithPension - STANDARD_DEDUCTION_SINGLE * inflationFactor) * STATE_TAX_BY_ZIP(activeZip);
      const fica = Math.min(salary, ssWageCap) * 0.062 + salary * 0.0145;
      annualTax = federalOnTotal + stateOnTotal + fica;
      monthlyAfterTax = (totalEarnedIncome + pensionIncome + ssIncome - annualTax) / 12;
    }

    // Child costs inflate with CPI
    const childExpenses = kids.reduce((sum, k) => {
      const childAge = year - k.birthYear;
      // Base child cost (ages 0-17)
      const baseCost = k.costMode === "custom" && k.phases?.length > 0
        ? childCostCustom(childAge, k.phases) * inflationFactor
        : childCostPerMonth(childAge, COL_MULTIPLIER_BY_ZIP(activeZip)) * inflationFactor;
      // College cost (configurable age range)
      const collegeStart = k.collegeStartAge ?? 18;
      const collegeEnd = collegeStart + (k.collegeYears ?? 4);
      const collegeCost = k.collegeEnabled && childAge >= collegeStart && childAge < collegeEnd
        ? ((k.collegeAnnualAmount ?? 0) / 12) * inflationFactor
        : 0;
      return sum + (baseCost + collegeCost) * 12;
    }, 0) / 12;

    // Student loan amortization
    let monthlyLoanPayment = 0;
    let monthlyPartnerLoanPayment = 0;
    if (loans?.enabled && loanBalance > 0) {
      const pslfForgiven = loans.pslfEnabled && year === (loans.pslfYears || 10);
      const pslfAlreadyDone = loans.pslfEnabled && year > (loans.pslfYears || 10);
      if (pslfForgiven) {
        // Add forgiven amount back to NW (if loan was included as a liability)
        netWorthNominal += loanBalance;
        loanBalance = 0;
      } else if (pslfAlreadyDone) {
        loanBalance = 0;
      } else {
        const loanMonthlyRate = (loans.interestRate || 6.5) / 100 / 12;
        const effectivePmt = loans.ibrPct != null ? calcIBRPayment(currentSalary, loans.ibrPct, loans.amount, loans.interestRate) : (loans.monthlyPayment || 0);
        const pmt = Math.min(effectivePmt, loanBalance * (1 + loanMonthlyRate));
        for (let m = 0; m < 12; m++) {
          const interest = loanBalance * loanMonthlyRate;
          const principal = Math.max(0, pmt - interest);
          loanBalance = Math.max(0, loanBalance - principal);
        }
        monthlyLoanPayment = pmt;
      }
    }
    if (loans?.partnerEnabled && partnerActive && partnerLoanBalance > 0) {
      const pslfForgiven = loans.partnerPslfEnabled && year === (loans.partnerPslfYears || 10);
      const pslfAlreadyDone = loans.partnerPslfEnabled && year > (loans.partnerPslfYears || 10);
      if (pslfForgiven) {
        netWorthNominal += partnerLoanBalance;
        partnerLoanBalance = 0;
      } else if (pslfAlreadyDone) {
        partnerLoanBalance = 0;
      } else {
        const loanMonthlyRate = (loans.partnerInterestRate || 6.5) / 100 / 12;
        const effectivePartnerPmt = loans.partnerIbrPct != null ? calcIBRPayment(partner?.salary || 0, loans.partnerIbrPct, loans.partnerAmount, loans.partnerInterestRate) : (loans.partnerMonthlyPayment || 0);
        const pmt = Math.min(effectivePartnerPmt, partnerLoanBalance * (1 + loanMonthlyRate));
        for (let m = 0; m < 12; m++) {
          const interest = partnerLoanBalance * loanMonthlyRate;
          const principal = Math.max(0, pmt - interest);
          partnerLoanBalance = Math.max(0, partnerLoanBalance - principal);
        }
        monthlyPartnerLoanPayment = pmt;
      }
    }

    const partnerExpenses = partnerActive ? (partnerRent + partnerOther) : 0;
    const propTaxRate = home?.taxRate != null ? home.taxRate / 100 : PROPERTY_TAX_BY_ZIP(activeZip);
    const monthlyPropertyTax = homeActive ? (propertyValue * propTaxRate / 12) : 0;
    const monthlyHOA = homeActive ? (home?.hoaFee || 0) * Math.pow(1 + inflationPct / 100, year) : 0;
    const activeMortgagePayment = homeActive && mortgageBalance > 0 ? monthlyMortgagePayment : 0;
    const housingCost = homeActive ? activeMortgagePayment + monthlyPropertyTax + monthlyHOA : rent;
    const monthlyExpenses = housingCost + other + childExpenses + partnerExpenses + monthlyLoanPayment + monthlyPartnerLoanPayment;
    const monthlySavings = monthlyAfterTax - monthlyExpenses;

    if (year > 0) {
      // Use per-year return/inflation if provided (Monte Carlo path), else use base rates
      const yearReturn = (annualReturns && annualReturns[year] != null)
        ? annualReturns[year] : investmentReturnPct;
      const yearInflation = (annualInflations && annualInflations[year] != null)
        ? annualInflations[year] : inflationPct;
      const nominalMonthlyReturn = Math.pow(1 + yearReturn / 100, 1 / 12) - 1;
      for (let m = 0; m < 12; m++) {
        // Compute uninvested (cash/emergency fund) — grows with inflation only
        let uninvestedAmt = 0;
        if (uninvested?.enabled && netWorthNominal > 0) {
          uninvestedAmt = uninvested.mode === "fixed"
            ? Math.min((uninvested.amount || 0) * inflationFactor, netWorthNominal)
            : Math.min(netWorthNominal * (uninvested.pct || 0) / 100, netWorthNominal);
        }
        const investable = Math.max(0, netWorthNominal - uninvestedAmt);
        const nominalMonthlyInflation = Math.pow(1 + yearInflation / 100, 1 / 12) - 1;
        netWorthNominal = investable * (1 + nominalMonthlyReturn)
          + uninvestedAmt * (1 + nominalMonthlyInflation)
          + Math.min(0, netWorthNominal - uninvestedAmt)
          + monthlySavings;
      }
    }

    const homeEquity = homeActive ? Math.max(0, propertyValue - mortgageBalance) : 0;
    // Display adjustment: if user chose not to show loan as liability, add it back for display only
    const displayLoanAdj = (loans?.enabled && loans?.includeInNetWorth === false) ? loanBalance : 0;
    const displayPartnerLoanAdj = (loans?.partnerEnabled && loans?.partnerIncludeInNetWorth === false) ? partnerLoanBalance : 0;
    const displayAdj = displayLoanAdj + displayPartnerLoanAdj;
    const liquidNW = netWorthNominal + displayAdj;
    const totalNWNominal = liquidNW + homeEquity;
    const netWorthReal = totalNWNominal * deflator;
    const liquidNWReal = liquidNW * deflator;

    data.push({
      year,
      netWorthNominal: Math.round(totalNWNominal),
      netWorthReal: Math.round(netWorthReal),
      liquidNW: Math.round(liquidNW),
      liquidNWReal: Math.round(liquidNWReal),
      investedNWReal: Math.round(Math.max(0, liquidNW - (uninvested?.enabled
        ? (uninvested.mode === "fixed"
          ? Math.min((uninvested.amount || 0) * inflationFactor, liquidNW)
          : Math.min(liquidNW * (uninvested.pct || 0) / 100, liquidNW))
        : 0)) * deflator),
      homeEquity: Math.round(homeEquity),
      propertyValue: Math.round(propertyValue),
      mortgageBalance: Math.round(mortgageBalance),
      monthlyPropertyTax: Math.round(homeActive ? propertyValue * (home?.taxRate != null ? home.taxRate / 100 : PROPERTY_TAX_BY_ZIP(activeZip)) / 12 : 0),
      salary: Math.round(salary + pensionIncome + ssIncome),
      salaryReal: Math.round((salary + pensionIncome + ssIncome) * deflator),
      partnerSalary: Math.round(partnerSalary),
      combinedSalary: Math.round(salary + partnerSalary + pensionIncome + ssIncome),
      combinedSalaryReal: Math.round((salary + partnerSalary + pensionIncome + ssIncome) * deflator),
      monthlyAfterTax: Math.round(monthlyAfterTax),
      monthlyAfterTaxReal: Math.round(monthlyAfterTax * deflator),
      monthlyExpenses: Math.round(monthlyExpenses),
      monthlyExpensesReal: Math.round(monthlyExpenses * deflator),
      monthlySavings: Math.round(monthlySavings),
      monthlySavingsReal: Math.round(monthlySavings * deflator),
      childExpenses: Math.round(childExpenses),
      annualTax: Math.round(annualTax),
      inflationFactor: inflationFactor.toFixed(2),
      activeZip,
    });
  }

  return data;
}

};

// ── IBR payment calculator ────────────────────────────────────────────────────
// Federal poverty line 2024 (single person, lower 48): ~$15,060
// SAVE uses 225% of FPL, IBR uses 150% of FPL
const POVERTY_LINE = 15060;
function calcIBRPayment(annualSalary, ibrPct, loanBalance = 0, loanRate = 6.5) {
  // SAVE plan uses 225% FPL; classic IBR uses 150% FPL
  const fplMultiplier = ibrPct === 5 ? 2.25 : 1.50;
  const discretionary = Math.max(0, annualSalary - POVERTY_LINE * fplMultiplier);
  const ibrPayment = Math.round(discretionary * (ibrPct / 100) / 12);
  // Cap at standard 10-year repayment amount (if balance known)
  if (loanBalance > 0) {
    const r = loanRate / 100 / 12;
    const n = 120; // 10 years
    const standardPayment = r === 0 ? loanBalance / n
      : Math.round(loanBalance * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1));
    return Math.min(ibrPayment, standardPayment);
  }
  return ibrPayment;
}

// ── Loan balance projection helper ───────────────────────────────────────────
function projectedLoanBalance(balance, annualRate, monthlyPayment, years) {
  let bal = balance;
  const r = annualRate / 100 / 12;
  const totalMonths = years * 12;
  for (let m = 0; m < totalMonths; m++) {
    if (bal <= 0) return 0;
    const interest = bal * r;
    const principal = Math.max(0, monthlyPayment - interest);
    bal = Math.max(0, bal - principal);
  }
  return Math.round(bal);
}

// ── SSA Benefit Calculator ───────────────────────────────────────────────────
// Bend points for 2025 (in today's dollars, adjusted for wage growth since 1977)
// PIA = 90% of first $1,226 AIME + 32% of next $6,172 + 15% above $7,398
const SS_BEND1 = 1226;
const SS_BEND2 = 7398;

// Estimate monthly SS benefit at FRA (67) given a salary history
// salaryHistory: array of annual salaries (today's dollars) covering working years
// currentAge: used to fill in past years before the projection starts
function calcSSBenefit(annualSalary, currentAge, salaryStepsData, salaryGrowthMode, salaryGrowthPct, inflationPct) {
  // Build a 35-year earnings history in today's dollars
  // We project backwards from current salary and forwards using salary growth
  const totalYears = 35;
  const earnings = [];

  // Past years: approximate as current salary (could be lower, but no history available)
  // Younger workers will have fewer past working years — fill with 0 for years before age 22
  const workingYearsToDate = Math.max(0, Math.min(currentAge - 22, totalYears));

  // Use average of past salary as approximation — assume they earned current salary in past
  // (conservative — actual past earnings may be lower for residents/trainees)
  for (let i = 0; i < workingYearsToDate; i++) {
    earnings.push(annualSalary);
  }

  // Future years: use base salary growth rate
  let futureSalary = annualSalary;
  const futureYears = totalYears - workingYearsToDate;
  for (let yr = 1; yr <= futureYears; yr++) {
    // Apply step raises if present
    const step = (salaryStepsData || []).find(s => s.year === yr);
    if (step && salaryGrowthMode === "steps") {
      futureSalary = step.salary;
    } else if (salaryGrowthMode === "percentage") {
      futureSalary = futureSalary * (1 + salaryGrowthPct / 100);
    }
    earnings.push(Math.max(0, futureSalary));
  }

  // SS taxes max out at ~$176K/year (2025 wage base) — cap earnings
  const SS_WAGE_BASE = 176100;
  const cappedEarnings = earnings.map(e => Math.min(e, SS_WAGE_BASE));

  // Take top 35 years (already have exactly 35, but sort descending just in case)
  const top35 = cappedEarnings.sort((a, b) => b - a).slice(0, 35);
  const AIME = top35.reduce((s, e) => s + e, 0) / 35 / 12;

  // Apply bend-point formula
  let pia = 0;
  if (AIME <= SS_BEND1) {
    pia = AIME * 0.90;
  } else if (AIME <= SS_BEND2) {
    pia = SS_BEND1 * 0.90 + (AIME - SS_BEND1) * 0.32;
  } else {
    pia = SS_BEND1 * 0.90 + (SS_BEND2 - SS_BEND1) * 0.32 + (AIME - SS_BEND2) * 0.15;
  }

  return Math.round(pia);
}

// ── Main ──────────────────────────────────────────────────────────────────────
function NetWorthCalculator() {
  const [specialtyEnabled, setSpecialtyEnabled] = useState(false);
  const [selectedSpecialty, setSelectedSpecialty] = useState(null);

  const applySpecialty = (spec) => {
    if (!spec) { setSelectedSpecialty(null); setNetWorth(50000); setSalaryMode('percentage'); setSalarySteps([{ year: 5, salary: 120000 }]); return; }
    setSelectedSpecialty(spec);
    setNetWorth(-100000);
    setSalary(75000);
    setSalaryMode("steps");
    setSalarySteps([{ year: spec.residencyYears, salary: spec.avgSalary }]);
  };

  const [currentAge, setCurrentAge]       = useState(35);
  const [partnerAge, setPartnerAge]       = useState(35);
  const [netWorth, setNetWorth]           = useState(0);
  const [salary, setSalary]               = useState(75000);
  const [salaryMode, setSalaryMode]       = useState("percentage");
  const [salaryGrowthPct, setSalaryGrowthPct] = useState(0);
  const [salarySteps, setSalarySteps]     = useState([{ year: 5, salary: 120000 }]);

  const [rent, setRent]                   = useState(1500);
  const [rentMode, setRentMode]           = useState("percentage");
  const [rentGrowthPct, setRentGrowthPct] = useState(0);
  const [rentSteps, setRentSteps]         = useState([{ year: 5, amount: 2800 }]);

  const [otherExp, setOtherExp]           = useState(1500);
  const [otherMode, setOtherMode]         = useState("percentage");
  const [otherGrowthPct, setOtherGrowthPct] = useState(0);
  const [otherSteps, setOtherSteps]       = useState([{ year: 5, amount: 2800 }]);

  const [zip, setZip]                     = useState("10001");
  const [zipMoves, setZipMoves]           = useState([]);
  const [newMoveYear, setNewMoveYear]     = useState(5);
  const [newMoveZip, setNewMoveZip]       = useState("");
  const [returnPct, setReturnPct]         = useState(10.5);
  const [inflationKey, setInflationKey]   = useState("historical");
  const [customInflation, setCustomInflation] = useState(3.1);
  const [useCustomInflation, setUseCustomInflation] = useState(false);
  const [projYears, setProjYears]         = useState(10);
  const [kids, setKids]                   = useState([]);
  const [newKidYear, setNewKidYear]       = useState(3);
  const [partner, setPartner] = useState({
    enabled: false,
    netWorth: 0,
    salary: 75000,
    salaryMode: "percentage",
    salaryGrowthPct: 0,
    salarySteps: [{ year: 5, salary: 120000 }],
    rent: 0,
    rentMode: "percentage",
    rentGrowthPct: 0,
    rentSteps: [{ year: 5, amount: 400 }],
    otherExp: 0,
    otherMode: "percentage",
    otherGrowthPct: 0,
    otherSteps: [{ year: 5, amount: 1000 }],
    marriageYear: 0,
  });
  const updatePartner = (field, val) => setPartner(p => ({ ...p, [field]: val }));

  const [loans, setLoans] = useState({
    enabled: false,
    amount: 200000,
    interestRate: 6.5,
    monthlyPayment: 562,
    includeInNetWorth: true,
    pslfEnabled: false,
    pslfYears: 10,
    ibrPct: 10, // null = manual, 5/10/15 = IBR calculated
    // Partner
    partnerEnabled: false,
    partnerAmount: 200000,
    partnerInterestRate: 6.5,
    partnerMonthlyPayment: 562,
    partnerIncludeInNetWorth: true,
    partnerPslfEnabled: false,
    partnerPslfYears: 10,
    partnerIbrPct: 10,
  });
  const updateLoans = (field, val) => setLoans(l => ({ ...l, [field]: val }));

  const [retirement, setRetirement] = useState({
    enabled: false,
    retireAge: 65,
    pensionEnabled: false,
    pensionAmount: 30000, // annual, today's dollars
    partnerCurrentAge: 35,
    partnerRetireAge: 65,
    partnerPensionEnabled: false,
    partnerPensionAmount: 30000,
  });
  const updateRetirement = (field, val) => setRetirement(r => ({ ...r, [field]: val }));

  const [uninvested, setUninvested] = useState({
    enabled: false,
    mode: "fixed",   // "fixed" | "percentage"
    amount: 0,       // fixed dollar amount (today's dollars)
    pct: 5,          // percentage of net worth
  });
  const updateUninvested = (field, val) => setUninvested(u => ({ ...u, [field]: val }));

  const [fire, setFire] = useState({
    targetMode: "spending",  // "spending" | "networth"
    annualSpending: 100000,  // today's dollars
    targetNetWorth: 2500000, // today's dollars
    withdrawalRate: 4.0,     // % (for spending → NW calc)
    withdrawalTaxRate: 15.0,  // % effective tax on withdrawals (used only in manual mode)
    withdrawalTaxMode: 'auto',   // 'auto' | 'manual'
    coastRetireAge: 65,
    baristaEnabled: true,
    baristaIncome: 24000,  // annual part-time income, today's dollars
  });
  const updateFire = (field, val) => setFire(f => ({ ...f, [field]: val }));

  const [ss, setSS] = useState({
    enabled: false,
    claimAge: 67,             // age to claim (62-70)
    partnerClaimAge: 67,
  });
  const updateSS = (field, val) => setSS(s => ({ ...s, [field]: val }));

  const resetAll = () => {
    setSpecialtyEnabled(false); setSelectedSpecialty(null);
    setCurrentAge(35); setPartnerAge(35); setNetWorth(0); setSalary(75000);
    setSalaryMode("percentage"); setSalaryGrowthPct(0); setSalarySteps([{ year: 5, salary: 120000 }]);
    setRent(1500); setRentMode("percentage"); setRentGrowthPct(0); setRentSteps([{ year: 5, amount: 2800 }]);
    setOtherExp(1500); setOtherMode("percentage"); setOtherGrowthPct(0); setOtherSteps([{ year: 5, amount: 2800 }]);
    setZip("10001"); setZipMoves([]); setNewMoveYear(5); setNewMoveZip("");
    setReturnPct(10.5); setInflationKey("historical"); setCustomInflation(3.1); setUseCustomInflation(false);
    setProjYears(10); setKids([]); setNewKidYear(3);
    setPartner({ enabled: false, netWorth: 0, salary: 75000, salaryMode: "percentage", salaryGrowthPct: 0,
      salarySteps: [{ year: 5, salary: 120000 }], rent: 0, rentMode: "percentage", rentGrowthPct: 0,
      rentSteps: [{ year: 5, amount: 400 }], otherExp: 0, otherMode: "percentage", otherGrowthPct: 0,
      otherSteps: [{ year: 5, amount: 1000 }], marriageYear: 0 });
    setLoans({ enabled: false, amount: 200000, interestRate: 6.5, monthlyPayment: 562,
      includeInNetWorth: true, pslfEnabled: false, pslfYears: 10, ibrPct: 10,
      partnerEnabled: false, partnerAmount: 200000, partnerInterestRate: 6.5, partnerMonthlyPayment: 562,
      partnerIncludeInNetWorth: true, partnerPslfEnabled: false, partnerPslfYears: 10, partnerIbrPct: 10 });
    setRetirement({ enabled: false, retireAge: 65, pensionEnabled: false,
      pensionAmount: 30000, pensionStartAge: 65, partnerRetireAge: 65,
      partnerPensionEnabled: false, partnerPensionAmount: 30000, partnerPensionStartAge: 65 });
    setUninvested({ enabled: false, mode: "fixed", amount: 0, pct: 5 });
    setHome({ enabled: false, purchaseYear: 3, purchasePrice: 600000, downPct: 20,
      termYears: 15, interestRate: 5.25, appreciationPct: 4.0, taxRate: null, hoaFee: 0,
      familyGiftEnabled: false, familyGiftAmount: 0 });
    setFire({ targetMode: "spending", annualSpending: 100000, targetNetWorth: 2500000,
      withdrawalRate: 4.0, withdrawalTaxRate: 15.0, withdrawalTaxMode: "auto",
      coastRetireAge: 65, baristaEnabled: true, baristaIncome: 24000 });
    setDisplayMode("real"); setActiveTab("networth");
    setSS({ enabled: false, claimAge: 67, partnerClaimAge: 67 });
  };

  const getSnapshot = () => ({
    version: 1,
    specialtyEnabled, selectedSpecialty,
    netWorth, salary, salaryMode, salaryGrowthPct, salarySteps,
    rent, rentMode, rentGrowthPct, rentSteps,
    otherExp, otherMode, otherGrowthPct, otherSteps,
    zip, zipMoves, returnPct,
    inflationKey, customInflation, useCustomInflation,
    projYears, kids, partner, home, displayMode, retirement, loans, uninvested, fire, ss,
  });

  const downloadSettings = () => {
    const json = JSON.stringify(getSnapshot(), null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "nw-forecast-settings.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const loadSettings = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const s = JSON.parse(ev.target.result);
        if (s.specialtyEnabled !== undefined) setSpecialtyEnabled(s.specialtyEnabled);
        if (s.selectedSpecialty !== undefined) setSelectedSpecialty(s.selectedSpecialty);
        if (s.netWorth !== undefined) setNetWorth(s.netWorth);
        if (s.salary !== undefined) setSalary(s.salary);
        if (s.salaryMode !== undefined) setSalaryMode(s.salaryMode);
        if (s.salaryGrowthPct !== undefined) setSalaryGrowthPct(s.salaryGrowthPct);
        if (s.salarySteps !== undefined) setSalarySteps(s.salarySteps);
        if (s.rent !== undefined) setRent(s.rent);
        if (s.rentMode !== undefined) setRentMode(s.rentMode);
        if (s.rentGrowthPct !== undefined) setRentGrowthPct(s.rentGrowthPct);
        if (s.rentSteps !== undefined) setRentSteps(s.rentSteps);
        if (s.otherExp !== undefined) setOtherExp(s.otherExp);
        if (s.otherMode !== undefined) setOtherMode(s.otherMode);
        if (s.otherGrowthPct !== undefined) setOtherGrowthPct(s.otherGrowthPct);
        if (s.otherSteps !== undefined) setOtherSteps(s.otherSteps);
        if (s.zip !== undefined) setZip(s.zip);
        if (s.zipMoves !== undefined) setZipMoves(s.zipMoves);
        if (s.returnPct !== undefined) setReturnPct(s.returnPct);
        if (s.inflationKey !== undefined) setInflationKey(s.inflationKey);
        if (s.customInflation !== undefined) setCustomInflation(s.customInflation);
        if (s.useCustomInflation !== undefined) setUseCustomInflation(s.useCustomInflation);
        if (s.projYears !== undefined) setProjYears(s.projYears);
        if (s.kids !== undefined) setKids(s.kids);
        if (s.partner !== undefined) setPartner(s.partner);
        if (s.home !== undefined) setHome(s.home);
        if (s.displayMode !== undefined) setDisplayMode(s.displayMode);
        if (s.retirement !== undefined) setRetirement(s.retirement);
        if (s.loans !== undefined) setLoans(s.loans);
        if (s.uninvested !== undefined) setUninvested(s.uninvested);
        if (s.fire !== undefined) setFire(s.fire);
        if (s.ss !== undefined) setSS(s.ss);
      } catch (err) {
        alert("Failed to load settings: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = ""; // reset so same file can be re-loaded
  };

  const [home, setHome] = useState({
    enabled: false,
    purchaseYear: 3,
    purchasePrice: 600000,
    downPct: 20,
    termYears: 15,
    interestRate: 5.25,
    appreciationPct: 4.0,
    taxRate: null, // null = auto from ZIP
    hoaFee: 0,
    familyGiftEnabled: false,
    familyGiftAmount: 0,
  });
  const updateHome = (field, val) => setHome(h => ({ ...h, [field]: val }));

  const [displayMode, setDisplayMode]     = useState("real"); // "nominal" | "real" | "both"
  const [activeTab, setActiveTab]         = useState("networth");

  const inflationPct = useCustomInflation ? customInflation : INFLATION_PRESETS[inflationKey].pct;

  const updateSalaryStep = (i, field, val) =>
    setSalarySteps(s => s.map((st, idx) => idx === i ? { ...st, [field]: val } : st));
  const addSalaryStep = () => setSalarySteps(s => [...s, { year: (s[s.length - 1]?.year || 0) + 3, salary: salary + 20000 }]);
  const removeSalaryStep = (i) => setSalarySteps(s => s.filter((_, idx) => idx !== i));

  const addKid = () => {
    const col = COL_MULTIPLIER_BY_ZIP(zip);
    setKids(k => [...k, {
      id: Date.now(),
      birthYear: newKidYear,
      costMode: 'auto',
      phases: [
        { years: 1,  amount: Math.round(2200 * col) }, // infant
        { years: 4,  amount: Math.round(1800 * col) }, // toddler
        { years: 8,  amount: Math.round(1100 * col) }, // school age
        { years: 5,  amount: Math.round(1300 * col) }, // teen
      ],
      collegeEnabled: false,
      collegeStartAge: 18,
      collegeYears: 4,
      collegeAnnualAmount: 30000, // today's dollars/year
    }]);
  };
  const removeKid = (id) => setKids(k => k.filter(c => c.id !== id));

  const addMove = () => {
    if (newMoveZip.length < 5) return;
    setZipMoves(m => [...m, { id: Date.now(), year: newMoveYear, zip: newMoveZip }]);
    setNewMoveZip("");
  };
  const removeMove = (id) => setZipMoves(m => m.filter(mv => mv.id !== id));

  const ssCalc = useMemo(() => {
    const ssCurrentAge = currentAge || 35;
    const partnerAgeForSS = partner.enabled ? (partnerAge || 35) : 35;
    const myBenefit = calcSSBenefit(salary, ssCurrentAge, salarySteps, salaryMode, salaryGrowthPct, inflationPct);
    const partnerBenefit = partner.enabled
      ? calcSSBenefit(partner.salary, partnerAgeForSS, partner.salarySteps, partner.salaryMode || "percentage", partner.salaryGrowthPct || 0, inflationPct)
      : 0;
    return { myBenefit, partnerBenefit };
  }, [salary, salaryMode, salaryGrowthPct, salarySteps, partner, inflationPct, currentAge, partnerAge]);

  const data = useMemo(() => runProjection({
    currentAge, partnerAge, currentNetWorth: netWorth, currentSalary: salary,
    salaryGrowthMode: salaryMode, salaryGrowthPct, salarySteps,
    monthlyRent: rent, rentGrowthMode: rentMode, rentGrowthPct, rentSteps,
    monthlyOtherExpenses: otherExp, otherGrowthMode: otherMode, otherGrowthPct, otherSteps,
    zip, zipMoves, investmentReturnPct: returnPct, inflationPct,
    kids, projectionYears: projYears,
    partner,
    home,
    retirement,
    loans,
    uninvested,
    ss: (() => {
      if (!ss?.enabled) return ss;
      const age = currentAge || 35;
      const pAge = partnerAge || 35;
      return { ...ss,
        calculatedBenefit: calcSSBenefit(salary, age, salarySteps, salaryMode, salaryGrowthPct, inflationPct),
        partnerCalculatedBenefit: partner.enabled ? calcSSBenefit(partner.salary, pAge, partner.salarySteps, partner.salaryMode || "percentage", partner.salaryGrowthPct || 0, inflationPct) : 0,
      };
    })(),
  }), [netWorth, salary, salaryMode, salaryGrowthPct, salarySteps,
       rent, rentMode, rentGrowthPct, rentSteps,
       otherExp, otherMode, otherGrowthPct, otherSteps,
       zip, zipMoves, returnPct, inflationPct, kids, projYears, partner, home, retirement, loans, uninvested, ss, currentAge, partnerAge]);

  const { yDomain, yTicks } = useMemo(() => {
    const nominalKey = activeTab === "networth" ? "netWorthNominal"
      : activeTab === "salary" ? "combinedSalary"
      : activeTab === "expenses" ? "monthlyExpenses"
      : "monthlySavings";
    const vals = data.map(d => d[nominalKey]).filter(v => v != null);
    if (!vals.length) return { yDomain: ["auto", "auto"], yTicks: [] };
    const rawMin = Math.min(0, ...vals);
    const rawMax = Math.max(...vals);
    const range = rawMax - rawMin || 1;
    // Pick a nice step that gives ~5 ticks
    const roughStep = range / 5;
    const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
    const niceFractions = [1, 2, 2.5, 5, 10];
    const step = niceFractions.map(f => f * magnitude).find(s => s >= roughStep) || magnitude * 10;
    const niceMin = Math.floor(rawMin / step) * step;
    const niceMax = Math.ceil(rawMax / step) * step;
    const ticks = [];
    for (let t = niceMin; t <= niceMax + step * 0.001; t += step) {
      ticks.push(Math.round(t));
    }
    return { yDomain: [niceMin, niceMax], yTicks: ticks };
  }, [data, activeTab]);



  const chartData = data;

  const mcChartData = data;

  // FIRE calculations
  const fireCalc = useMemo(() => {
    // Compute effective withdrawal tax rate from the model's tax functions
    // We solve iteratively: gross = net / (1 - effectiveRate), where effectiveRate = tax(gross) / gross
    const computeEffectiveTaxRate = (netAmount) => {
      if (netAmount <= 0) return 0;
      // Iterate to find gross withdrawal that yields netAmount after tax
      let gross = netAmount * 1.25; // initial guess
      for (let i = 0; i < 20; i++) {
        const tax = calcTotalTax(gross, zip, 1);  // today's dollars, no inflation adjustment needed
        const netFromGross = gross - tax;
        if (Math.abs(netFromGross - netAmount) < 1) break;
        gross = gross * (netAmount / Math.max(1, netFromGross));
      }
      const finalTax = calcTotalTax(gross, zip, 1);
      return gross > 0 ? finalTax / gross : 0;
    };

    const autoTaxRate = fire.targetMode === "spending" && (fire.annualSpending || 0) > 0
      ? computeEffectiveTaxRate(fire.annualSpending || 0)
      : 0.15;
    const taxRate = fire.withdrawalTaxMode === "manual"
      ? (fire.withdrawalTaxRate || 0) / 100
      : autoTaxRate;
    const displayTaxPct = Math.round(taxRate * 1000) / 10; // one decimal
    // Pension income (in today's dollars) reduces the portfolio withdrawal needed
    const pensionAnnual = (retirement?.enabled && retirement?.pensionEnabled)
      ? (retirement.pensionAmount || 0) : 0;
    const partnerPensionAnnual = (retirement?.enabled && retirement?.partnerPensionEnabled)
      ? (retirement.partnerPensionAmount || 0) : 0;
    // Add SS to pension offset (both reduce portfolio need)
    const FRA_FIRE = 67;
    const ssBenefitFactorFire = (claimAge) => {
      const m = (claimAge - FRA_FIRE) * 12;
      if (m >= 0) return 1 + m * 0.08 / 12;
      if (m >= -36) return 1 + m * (5/9) / 100;
      return 1 + (-36) * (5/9) / 100 + (m + 36) * (5/12) / 100;
    };
    const ssAnnual = ss?.enabled ? (ssCalc.myBenefit || 0) * 12 * ssBenefitFactorFire(ss.claimAge || 67) : 0;
    const partnerSSAnnual = (ss?.enabled && partner?.enabled) ? (ssCalc.partnerBenefit || 0) * 12 * ssBenefitFactorFire(ss.partnerClaimAge || 67) : 0;
    const totalPensionIncome = pensionAnnual + partnerPensionAnnual + ssAnnual + partnerSSAnnual;
    // Annual spending entered is after-tax. Pension is pre-tax — convert to after-tax equivalent.
    const afterTaxPension = totalPensionIncome * (1 - taxRate);
    // After-tax portfolio gap = what the portfolio must deliver after tax
    const netSpendingAfterPension = fire.targetMode === "spending"
      ? Math.max(0, (fire.annualSpending || 0) - afterTaxPension)
      : null;
    // Gross up the portfolio gap for withdrawal taxes
    const grossSpending = fire.targetMode === "spending"
      ? netSpendingAfterPension / Math.max(0.01, 1 - taxRate)
      : null;
    const targetNW = fire.targetMode === "spending"
      ? grossSpending / ((fire.withdrawalRate || 4) / 100)
      : (fire.targetNetWorth || 0);
    // Run a 50-year projection for FIRE milestone searching (independent of chart horizon)
    const fireProjection = runProjection({
      currentNetWorth: netWorth, currentSalary: salary,
      salaryGrowthMode: salaryMode, salaryGrowthPct, salarySteps,
      monthlyRent: rent, rentGrowthMode: rentMode, rentGrowthPct, rentSteps,
      monthlyOtherExpenses: otherExp, otherGrowthMode: otherMode, otherGrowthPct, otherSteps,
      zip, zipMoves, investmentReturnPct: returnPct, inflationPct,
      kids, projectionYears: 50,
      partner, home, retirement, loans, uninvested,
    });
    const currentNWNow = fireProjection[0]?.investedNWReal ?? 0; // current invested real NW (excl. home equity + cash)

    // Years to FIRE: find first year where real NW >= targetNW
    let yearsToFire = null;
    for (const d of fireProjection) {
      if (d.investedNWReal >= targetNW) { yearsToFire = d.year; break; }
    }

    // CoastFIRE: how much do you need TODAY so it grows to targetNW by retireAge without contributions?
    // coastNW = targetNW / (1 + realReturn)^(retireAge - currentAge)
    const realReturnDecimal = ((1 + returnPct / 100) / (1 + inflationPct / 100) - 1);
    // Use retirement tool ages if that tool is enabled
    const effectiveCurrentAge = currentAge || 35;
    const effectiveRetireAge  = retirement?.enabled ? (retirement.retireAge  || 65) : (fire.coastRetireAge || 65);
    const yearsToRetire = Math.max(0, effectiveRetireAge - effectiveCurrentAge);
    const coastTarget = targetNW / Math.pow(1 + realReturnDecimal, yearsToRetire);

    // Years until CoastFIRE: find first year where real NW >= coastTarget
    let yearsToCoast = null;
    for (const d of fireProjection) {
      if (d.investedNWReal >= coastTarget) { yearsToCoast = d.year; break; }
    }

    const alreadyFIRE = currentNWNow >= targetNW; // based on invested NW
    const alreadyCoast = currentNWNow >= coastTarget;

    // BaristaFIRE: part-time income covers some expenses, portfolio only needs to fund the gap
    const baristaGapSpending = fire.targetMode === "spending"
      ? Math.max(0, (fire.annualSpending || 0) - (fire.baristaIncome || 0))
      : null;
    const baristaGrossGap = baristaGapSpending != null
      ? baristaGapSpending / Math.max(0.01, 1 - taxRate)
      : null;
    const baristaTargetNW = baristaGrossGap != null
      ? baristaGrossGap / ((fire.withdrawalRate || 4) / 100)
      : null;
    let yearsToBaristaFire = null;
    if (baristaTargetNW != null) {
      const alreadyBarista = (fireProjection[0]?.investedNWReal ?? 0) >= baristaTargetNW;
      if (alreadyBarista) yearsToBaristaFire = 0;
      else for (const d of fireProjection) {
        if (d.investedNWReal >= baristaTargetNW) { yearsToBaristaFire = d.year; break; }
      }
    }

    return { targetNW, coastTarget, yearsToFire, yearsToCoast, alreadyFIRE, alreadyCoast, realReturnDecimal, yearsToRetire, grossSpending, baristaTargetNW, yearsToBaristaFire, baristaGapSpending, effectiveCurrentAge, effectiveRetireAge, totalPensionIncome, netSpendingAfterPension, taxRate, displayTaxPct };
  }, [netWorth, salary, salaryMode, salaryGrowthPct, salarySteps,
      rent, rentMode, rentGrowthPct, rentSteps,
      otherExp, otherMode, otherGrowthPct, otherSteps,
      zip, zipMoves, returnPct, inflationPct, kids,
      partner, home, retirement, loans, uninvested, fire]);

  // Compute SS benefits from salary data
  const final = data[data.length - 1];
  const cur   = data[0];
  const stateRate = (STATE_TAX_BY_ZIP(zip) * 100).toFixed(1);
  const realReturn = ((1 + returnPct / 100) / (1 + inflationPct / 100) - 1) * 100;

  const CHART_TABS = [
    { id: "networth",  label: "Net Worth" },
    { id: "salary",    label: "Salary" },
    { id: "expenses",  label: "Mo. Expenses" },
    { id: "savings",   label: "Mo. Savings" },
  ];

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', system-ui, sans-serif", background: "#080b10", minHeight: "100vh", color: "#e8eaf0", padding: "24px 16px" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 5px; background: #080b10; }
        ::-webkit-scrollbar-thumb { background: #1c1f2b; border-radius: 4px; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
      `}</style>

      {/* ── Header ── */}
      <div style={{ maxWidth: 1240, margin: "0 auto 24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 12 }}>
          <div>
            <h1 style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 26, fontWeight: 600, margin: "0 0 3px", letterSpacing: "-0.02em" }}>

              <tbody>
                {data.filter((_, i) => i % (projYears > 20 ? 5 : projYears > 10 ? 2 : 1) === 0).map(row => (
                  <tr key={row.year} style={{ borderBottom: "1px solid #080b10" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#0f1117"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{row.year}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{fmt(row.partnerSalary > 0 ? row.combinedSalaryReal : row.salaryReal)}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{row.combinedSalaryReal > 0 ? (row.annualTax / (row.combinedSalaryReal * parseFloat(row.inflationFactor)) * 100).toFixed(1) + "%" : "—"}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: "#6b7280" }}>{fmt(row.monthlyExpensesReal)}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: row.monthlySavingsReal >= 0 ? "#34d399" : "#f87171" }}>{fmt(row.monthlySavingsReal)}</td>
                    <td style={{ textAlign: "right", padding: "8px 10px", color: row.monthlySavingsReal >= 0 ? "#34d399" : "#f87171" }}>{row.monthlyAfterTaxReal > 0 ? (row.monthlySavingsReal / row.monthlyAfterTaxReal * 100).toFixed(1) + "%" : "—"}</td>
                    {home.enabled ? (
                      <>
                        <td style={{ textAlign: "right", padding: "8px 10px", color: "#a78bfa", fontWeight: 600 }}>{fmt(row.liquidNWReal)}</td>
                        <td style={{ textAlign: "right", padding: "8px 10px", color: "#34d399", fontWeight: 600 }}>{fmt(Math.round(row.homeEquity / parseFloat(row.inflationFactor)))}</td>
                        <td style={{ textAlign: "right", padding: "8px 10px", color: "#4f8ef7", fontWeight: 600 }}>{fmt(row.netWorthReal)}</td>
                      </>
                    ) : (
                      <td style={{ textAlign: "right", padding: "8px 10px", color: "#4f8ef7", fontWeight: 600 }}>{fmt(row.netWorthReal)}</td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid #0d1117", display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 8 }}>
            <div>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, fontWeight: 700, color: "#374151", letterSpacing: "0.05em" }}>DWang</span>
              <span style={{ fontSize: 10, color: "#1f2937", marginLeft: 10 }}>
                App updated: <span style={{ color: "#374151" }}>March 2026</span>
                <span style={{ margin: "0 6px", color: "#1f2937" }}>·</span>
                Data updated: <span style={{ color: "#374151" }}>2025 tax year · S&P / CPI through 2024</span>
              </span>
            </div>
            <p style={{ fontSize: 10, color: "#1f2937", margin: 0 }}>
              Projections are illustrative only · Not financial advice · Tax estimates are approximate
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NetWorthCalculator />);
  </script>
</body>
</html>
